<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ODS Metering Systems</title>
    
    <meta name="theme-color" content="#dc2626" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ODS Metering" />
    <link rel="apple-touch-icon" href="https://ods-metering.com/wp-content/uploads/2024/09/ODS-METERING-SYSTEMS-LOGO-V2.png">
    <link rel="manifest" href="manifest.json" />

    <!-- Scripts Externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area *, #print-area-agenda, #print-area-agenda *, #in-out-print-area, #in-out-print-area *, .print-barcode, .print-barcode * { visibility: visible; }
            #print-area, #print-area-agenda { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; border: none; box-shadow: none; }
            .print-barcode { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex !important; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
            .no-print { display: none !important; }
            @page { size: landscape; margin: 1cm; }
        }
        .ods-red-text { color: #dc2626; }
        .ods-red-bg { background-color: #dc2626; }
        .ods-red-bg-hover:hover { background-color: #b91c1c; }
        .status-service-bg { background-color: #ef4444; } 
        .status-lab-bg { background-color: #f87171; } 
        .status-dayoff-bg { background-color: #fca5a5; } 
        .status-service-legend-bg { background-color: #ef4444; }
        .status-lab-legend-bg { background-color: #f87171; }
        .status-dayoff-legend-bg { background-color: #fca5a5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIGURAÇÃO CLOUD DB (GOOGLE SHEETS) ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzim4cSvS2D0Xvn4VjhEPjfOuxvRxDBrBJPmJ8S7Ri-EPiR1389rBmFwG02h7_eflQ9/exec";

        const CloudDB = {
            async fetchAll() {
                if(!GOOGLE_SCRIPT_URL.includes("http")) return { activities: [], daysOff: [], inventory: [], settings: [] };
                const res = await fetch(GOOGLE_SCRIPT_URL);
                return await res.json();
            },
            async put(store, item) {
                if(!GOOGLE_SCRIPT_URL.includes("http")) return;
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify({ action: 'put', store, item })
                });
            },
            async delete(store, id) {
                if(!GOOGLE_SCRIPT_URL.includes("http")) return;
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'delete', store, id })
                });
            }
        };

        const employeesList = [
            { id: 1, name: 'Marcio Martirios', category: 'Service' },
            { id: 2, name: 'Phamela Carvalho', category: 'Service' },
            { id: 3, name: 'Leonardo Tonim', category: 'Service' },
            { id: 4, name: 'Diego Garcia', category: 'Service' },
            { id: 5, name: 'Abhner Lage', category: 'Service' },
            { id: 6, name: 'PSO', category: 'Service' },
            { id: 7, name: 'Rodrigo Domingues', category: 'Service' },
            { id: 8, name: 'Ivan Lino', category: 'Service' },
            { id: 9, name: 'Thiago Gallinucci', category: 'Service' },
            { id: 10, name: 'Rafael Perin', category: 'Service' },
            { id: 11, name: 'Victor Franca', category: 'Service' },
            { id: 12, name: 'Adolfo Eiras', category: 'Lab' },
            { id: 13, name: 'Carol Bastos', category: 'Lab' },
            { id: 14, name: 'Leonardo Pereira', category: 'Lab' },
            { id: 15, name: 'Leonardo Galdino', category: 'Lab' },
            { id: 16, name: 'Beatriz Matuck', category: 'Lab' },
            { id: 17, name: 'Marcos Barros', category: 'Lab' },
            { id: 18, name: 'Matheus Moraes', category: 'Lab' },
            { id: 19, name: 'Matheus Bandeira', category: 'Lab' },
            { id: 20, name: 'Francisco Nascimento', category: 'Lab' },
            { id: 21, name: 'Iago Fiuza', category: 'Lab' },
            { id: 22, name: 'Caio Campos', category: 'Lab' },
            { id: 23, name: 'Marcus Fioravante', category: 'Lab' },
            { id: 24, name: 'Nathan', category: 'Lab' },
            { id: 25, name: 'Igor Felisberto', category: 'Lab' },
            { id: 26, name: 'Maiton Bertuso', category: 'Lab' },
            { id: 27, name: 'Felipe Oliveira', category: 'Lab' },
            { id: 28, name: 'Renato da Silva', category: 'Lab' },
            { id: 29, name: 'André Bigeschi', category: 'Lab' },
            { id: 30, name: 'Marcelo Teófilo', category: 'Lab' },
            { id: 31, name: 'Claudio Miranda', category: 'Lab' },
            { id: 32, name: 'Luiz Batista', category: 'Lab' },
            { id: 33, name: 'Andre Silva', category: 'Lab' },
            { id: 34, name: 'Pedro Lucena', category: 'Lab' },
            { id: 35, name: 'Renilson Feitosa', category: 'Lab' }
        ];

        // --- ÍCONES ---
        const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const ClipboardCheckIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><polyline points="9 14 11 16 15 12"></polyline></svg>;
        const PackageIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
        const CameraIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>;
        const BarcodeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"></path></svg>;

        const formatDateBR = (d) => d ? d.split('-').reverse().join('/') : '';

        // --- COMPONENTES ---
        const DetailsModal = ({ selectedItem, setSelectedItem, deleteItem, handleEdit, serviceTypes, locations, dayOffReasons }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editData, setEditData] = useState({});
            useEffect(() => { setIsEditing(false); if(selectedItem) setEditData({ description: selectedItem.description || '', reason: selectedItem.reason || '', serviceType: selectedItem.serviceType || '', location: selectedItem.location || '' }); }, [selectedItem]);
            if (!selectedItem) return null;
            const onSaveEdit = () => { handleEdit(selectedItem, editData); setIsEditing(false); };
            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-4 text-white flex justify-between items-center ${selectedItem.isDayOff ? 'status-dayoff-bg' : selectedItem.sector === 'Service' ? 'status-service-bg' : 'status-lab-bg'}`}>
                            <h3 className="font-bold text-lg">Detalhes</h3>
                            <div className="flex gap-2">
                                {!isEditing && <button onClick={() => setIsEditing(true)} className="bg-white/20 px-2 py-1 rounded text-xs font-bold transition">Editar</button>}
                                <button onClick={() => setSelectedItem(null)} className="text-white font-bold text-xl">&times;</button>
                            </div>
                        </div>
                        <div className="p-6 space-y-4 overflow-y-auto custom-scrollbar flex-1">
                            <p><strong>Colaborador:</strong> {selectedItem.employee.name}</p>
                            <p><strong>Período:</strong> {formatDateBR(selectedItem.date)}</p>
                            {selectedItem.isDayOff ? (
                                <div>
                                    <p><strong>Motivo:</strong></p>
                                    {isEditing ? <select value={editData.reason} onChange={e => setEditData({...editData, reason: e.target.value})} className="w-full p-2 border rounded">{dayOffReasons.map(r => <option key={r} value={r}>{r}</option>)}</select> : <p>{selectedItem.reason}</p>}
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <p><strong>Serviço:</strong> {isEditing ? <select value={editData.serviceType} onChange={e => setEditData({...editData, serviceType: e.target.value})} className="w-full p-2 border rounded">{serviceTypes.map(t => <option key={t} value={t}>{t}</option>)}</select> : selectedItem.serviceType}</p>
                                    <p><strong>Local:</strong> {isEditing ? <select value={editData.location} onChange={e => setEditData({...editData, location: e.target.value})} className="w-full p-2 border rounded">{locations.map(l => <option key={l} value={l}>{l}</option>)}</select> : selectedItem.location}</p>
                                    <p><strong>Descrição:</strong> {isEditing ? <textarea value={editData.description} onChange={e => setEditData({...editData, description: e.target.value})} className="w-full p-2 border rounded" /> : selectedItem.description}</p>
                                </div>
                            )}
                        </div>
                        <div className="p-4 bg-gray-50 border-t flex justify-between gap-3">
                            {isEditing ? <>
                                <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-gray-600">Cancelar</button>
                                <button onClick={onSaveEdit} className="px-5 py-2 bg-green-600 text-white rounded-lg">Salvar</button>
                            </> : <>
                                <button onClick={() => { deleteItem(selectedItem.isDayOff ? 'dayOff' : 'activity', selectedItem.spanIds || selectedItem.id); setSelectedItem(null); }} className="px-3 py-1.5 bg-red-50 text-red-600 border rounded-lg">Excluir</button>
                                <button onClick={() => setSelectedItem(null)} className="px-5 py-1.5 text-gray-700 bg-white border rounded-lg">Fechar</button>
                            </>}
                        </div>
                    </div>
                </div>
            );
        };

        const InventoryView = ({ inventory, setInventory, showMessage }) => {
            const [barcodeInput, setBarcodeInput] = useState('');
            const [qtyInput, setQtyInput] = useState(1);
            const [opType, setOpType] = useState('in');
            const [isScanning, setIsScanning] = useState(false);
            const [newItemModal, setNewItemModal] = useState(null);
            const [newItemName, setNewItemName] = useState('');
            const [showBarcodeModal, setShowBarcodeModal] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                let html5QrcodeScanner;
                if (isScanning) {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } }, false);
                    html5QrcodeScanner.render((decodedText) => { setBarcodeInput(decodedText); setIsScanning(false); try { html5QrcodeScanner.clear(); } catch(e){} }, (errorMessage) => {});
                }
                return () => { if(html5QrcodeScanner) try { html5QrcodeScanner.clear(); } catch(e){} };
            }, [isScanning]);

            useEffect(() => {
                if (showBarcodeModal && showBarcodeModal.barcode) {
                    setTimeout(() => { try { JsBarcode("#barcode-canvas", showBarcodeModal.barcode, { format: "CODE128", width: 2, height: 80, displayValue: true }); } catch(e){} }, 50);
                }
            }, [showBarcodeModal]);

            const handleOperation = async (e) => {
                if(e) e.preventDefault();
                const code = barcodeInput.trim().toUpperCase();
                if(!code || qtyInput <= 0) return showMessage('error', 'Preencha os dados.');
                const existingItem = inventory.find(i => i.barcode === code);
                if (!existingItem) { setNewItemModal({ barcode: code, type: opType, qty: qtyInput }); return; }
                let newQty = opType === 'in' ? existingItem.quantity + parseInt(qtyInput) : existingItem.quantity - parseInt(qtyInput);
                if (newQty < 0) return showMessage('error', 'Estoque insuficiente!');
                const updatedItem = { ...existingItem, quantity: newQty, lastUpdated: new Date().toISOString() };
                await CloudDB.put('inventory', updatedItem);
                setInventory(inventory.map(i => i.barcode === code ? updatedItem : i));
                setBarcodeInput('');
                showMessage('success', 'Atualizado!');
            };

            const saveNewItem = async (e) => {
                e.preventDefault();
                const item = { barcode: newItemModal.barcode, name: newItemName.trim(), quantity: newItemModal.type === 'in' ? parseInt(newItemModal.qty) : 0, lastUpdated: new Date().toISOString() };
                await CloudDB.put('inventory', item);
                setInventory([...inventory, item]);
                setNewItemModal(null); setNewItemName(''); setBarcodeInput('');
                showMessage('success', 'Cadastrado!');
            };

            const deleteInventoryItem = async (barcode) => {
                if(!confirm("Excluir item?")) return;
                await CloudDB.delete('inventory', barcode);
                setInventory(inventory.filter(i => i.barcode !== barcode));
                showMessage('success', 'Removido!');
            };

            const filteredInventory = inventory.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()) || i.barcode.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full max-w-6xl mx-auto w-full">
                    <div className="w-full lg:w-1/3 bg-white p-6 rounded-xl border no-print">
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><BarcodeIcon /> Lançamento</h2>
                        <div className="flex bg-gray-100 p-1 rounded-lg mb-6">
                            <button onClick={() => setOpType('in')} className={`flex-1 py-2 rounded text-sm font-bold ${opType === 'in' ? 'bg-green-500 text-white shadow' : 'text-gray-500'}`}>ENTRADA (+)</button>
                            <button onClick={() => setOpType('out')} className={`flex-1 py-2 rounded text-sm font-bold ${opType === 'out' ? 'bg-orange-500 text-white shadow' : 'text-gray-500'}`}>SAÍDA (-)</button>
                        </div>
                        {isScanning ? <div id="reader" className="w-full bg-black mb-4"></div> : <button onClick={() => setIsScanning(true)} className="w-full mb-4 bg-gray-800 text-white py-2 rounded flex items-center justify-center gap-2 transition-colors"><CameraIcon /> Câmera</button>}
                        <form onSubmit={handleOperation} className="space-y-4">
                            <input type="text" value={barcodeInput} onChange={(e) => setBarcodeInput(e.target.value)} placeholder="Código: AF1234" className="w-full p-3 border rounded uppercase font-mono text-center" />
                            <input type="number" min="1" value={qtyInput} onChange={(e) => setQtyInput(e.target.value)} className="w-full p-3 border rounded text-center font-bold" />
                            <button type="submit" className={`w-full text-white font-bold py-3 rounded ${opType === 'in' ? 'bg-green-600' : 'bg-orange-500'}`}>Registrar</button>
                        </form>
                    </div>
                    <div className="w-full lg:w-2/3 bg-white p-6 rounded-xl border flex flex-col max-h-[80vh] no-print">
                        <input type="text" placeholder="Buscar..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full p-2 mb-4 border rounded" />
                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            <table className="w-full text-left">
                                <thead className="bg-gray-50 sticky top-0">
                                    <tr className="text-[10px] uppercase font-bold text-gray-500">
                                        <th className="p-3">Item</th>
                                        <th className="p-3 text-center">Cód</th>
                                        <th className="p-3 text-center">Estoque</th>
                                        <th className="p-3 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredInventory.map(item => (
                                        <tr key={item.barcode} className="border-b text-sm">
                                            <td className="p-3 font-semibold">{item.name}</td>
                                            <td className="p-3 text-center font-mono uppercase text-xs">{item.barcode}</td>
                                            <td className="p-3 text-center font-bold">{item.quantity}</td>
                                            <td className="p-3 text-right">
                                                <button onClick={() => setShowBarcodeModal(item)} className="text-blue-600 mr-2"><BarcodeIcon /></button>
                                                <button onClick={() => deleteInventoryItem(item.barcode)} className="text-red-500"><TrashIcon /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {newItemModal && <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] p-4"><div className="bg-white p-6 rounded-xl w-full max-w-sm"><h3 className="font-bold mb-4">Novo Item: {newItemModal.barcode}</h3><form onSubmit={saveNewItem}><input type="text" value={newItemName} onChange={e => setNewItemName(e.target.value)} placeholder="Nome do Equipamento" className="w-full p-2 border rounded mb-4" required /><div className="flex justify-end gap-2"><button type="button" onClick={() => setNewItemModal(null)} className="p-2">Cancelar</button><button type="submit" className="bg-red-600 text-white p-2 px-4 rounded">Salvar</button></div></form></div></div>}
                    {showBarcodeModal && <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[110] p-4"><div className="bg-white p-8 rounded-xl flex flex-col items-center print-barcode"><p className="font-bold mb-2">{showBarcodeModal.name}</p><canvas id="barcode-canvas"></canvas><div className="mt-4 flex gap-2 no-print"><button onClick={() => window.print()} className="bg-gray-800 text-white p-2 px-4 rounded">Imprimir</button><button onClick={() => setShowBarcodeModal(null)} className="bg-white border p-2 px-4 rounded">Fechar</button></div></div></div>}
                </div>
            );
        };

        const AgendaView = ({ activities, daysOff, employees, currentDate, setCurrentDate, setSelectedItem, showMessage }) => {
            const year = currentDate.getFullYear();
            const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
            const allDays = useMemo(() => { const d = []; for (let m = 0; m < 12; m++) { const dim = new Date(year, m + 1, 0).getDate(); for (let i = 1; i <= dim; i++) { const dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`; d.push({ month: m, day: i, dateStr, isWeekend: [0,6].includes(new Date(year, m, i).getDay()) }); } } return d; }, [year]);
            const combined = useMemo(() => { const m = {}; [...activities, ...daysOff.map(d => ({...d, isDayOff: true, serviceType: d.reason}))].forEach(a => m[`${a.employeeId}-${a.date}`] = a); return m; }, [activities, daysOff]);
            return (
                <div className="bg-white p-4 rounded-xl border flex flex-col h-full overflow-hidden">
                    <div className="flex justify-between items-center mb-4"><h2 className="text-xl font-bold">Painel de Escala {year}</h2><div className="flex gap-2"><button onClick={() => setCurrentDate(new Date(year-1, 0, 1))} className="p-1">&lt; Ano</button><button onClick={() => setCurrentDate(new Date(year+1, 0, 1))} className="p-1">Ano &gt;</button></div></div>
                    <div id="print-area-agenda" className="flex-1 overflow-auto custom-scrollbar border rounded relative">
                        <table className="text-left border-collapse min-w-max w-full">
                            <thead className="sticky top-0 z-40 bg-gray-100 text-[10px] uppercase">
                                <tr>
                                    <th rowSpan="2" className="sticky left-0 top-0 bg-gray-200 p-2 border-b border-r z-50 w-[150px]">Colaborador</th>
                                    {months.map((m, i) => <th key={m} colSpan={new Date(year, i + 1, 0).getDate()} className="p-1 border-b border-r text-center font-bold bg-gray-200">{m}</th>)}
                                </tr>
                                <tr className="bg-gray-100">
                                    {allDays.map((d, i) => <th key={i} className={`p-0.5 border-b border-r text-center w-10 font-medium ${d.isWeekend ? 'bg-gray-300' : ''}`}>{d.day}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {employees.map(emp => (
                                    <tr key={emp.id} className="border-b text-xs hover:bg-gray-50/50">
                                        <td className="sticky left-0 bg-white p-1.5 border-r font-semibold z-30">{emp.name}</td>
                                        {allDays.map(day => {
                                            const act = combined[`${emp.id}-${day.dateStr}`];
                                            if (!act) return <td key={day.dateStr} className={`border-r ${day.isWeekend ? 'bg-gray-50' : ''}`}></td>;
                                            const bg = act.isDayOff ? "status-dayoff-bg" : act.sector === 'Service' ? "status-service-bg" : "status-lab-bg";
                                            return <td key={day.dateStr} className="p-[1px] border-r">
                                                <div onClick={() => setSelectedItem({ ...act, employee: emp })} className={`w-full h-8 rounded px-1 flex flex-col justify-center border text-white cursor-pointer ${bg}`}>
                                                    <div className="font-bold text-[8px] truncate">{act.location || 'FOLGA'}</div>
                                                    <div className="text-[7px] opacity-90 truncate">{act.serviceType}</div>
                                                </div>
                                            </td>;
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ChecklistInOutForm = ({ employees, locations, serviceTypes, showMessage }) => {
            const [state, setState] = useState({ empId: '', outDate: new Date().toISOString().split('T')[0], returnDate: '', location: '', selectedServices: [], equipmentIn: '', equipmentOut: '', observations: '', tasks: [{id:1, text: 'EPIs Padrão', status: 'Pendente'}, {id:2, text: 'Isolamento Área', status: 'Pendente'}] });
            const selectedEmp = employees.find(e => e.id === parseInt(state.empId)) || {};
            const generatePDF = () => window.html2pdf().set({ margin: 0.5, filename: `Relatorio_InOut.pdf`, html2canvas: { scale: 2 }, jsPDF: { format: 'a4', orientation: 'portrait' } }).from(document.getElementById('in-out-print-area')).save();
            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full w-full">
                    <div className="w-full lg:w-1/2 bg-white p-6 rounded-xl border overflow-y-auto custom-scrollbar max-h-[80vh]">
                        <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><ClipboardCheckIcon /> Checklist In/Out</h2>
                        <div className="space-y-4">
                            <select value={state.empId} onChange={e => setState({...state, empId: e.target.value})} className="w-full p-2 border rounded"><option value="">Selecionar Técnico...</option>{employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>
                            <div className="grid grid-cols-2 gap-4"><input type="date" value={state.outDate} onChange={e => setState({...state, outDate: e.target.value})} className="p-2 border rounded" /><input type="date" value={state.returnDate} onChange={e => setState({...state, returnDate: e.target.value})} className="p-2 border rounded" /></div>
                            <div className="flex flex-wrap gap-2"> {state.selectedServices.map(s => <span key={s} className="bg-red-50 text-red-800 p-1 px-2 border rounded text-xs">{s}</span>)} </div>
                            <select onChange={(e) => { const val = e.target.value; if(val && !state.selectedServices.includes(val)) setState({...state, selectedServices: [...state.selectedServices, val]}); }} className="w-full p-2 border rounded"><option value="">+ Adicionar Serviço</option>{serviceTypes.map(t => <option key={t} value={t}>{t}</option>)}</select>
                            <select value={state.location} onChange={e => setState({...state, location: e.target.value})} className="w-full p-2 border rounded"><option value="">Localidade...</option>{locations.map(l => <option key={l} value={l}>{l}</option>)}</select>
                            <div className="space-y-2 border-t pt-4"> {state.tasks.map(t => <div key={t.id} className="flex justify-between items-center p-2 bg-gray-50 rounded border"><span className="text-sm">{t.text}</span><div className="flex gap-1">{['OK', 'NOK'].map(s => <button key={s} onClick={() => setState({...state, tasks: state.tasks.map(tk => tk.id === t.id ? {...tk, status: s} : tk)})} className={`px-2 py-1 text-[10px] rounded ${t.status === s ? 'bg-red-600 text-white' : 'bg-white'}`}>{s}</button>)}</div></div>)} </div>
                            <textarea placeholder="IN (Entrada)" value={state.equipmentIn} onChange={e => setState({...state, equipmentIn: e.target.value})} className="w-full p-2 border rounded h-20" />
                            <textarea placeholder="OUT (Saída)" value={state.equipmentOut} onChange={e => setState({...state, equipmentOut: e.target.value})} className="w-full p-2 border rounded h-20" />
                            <button onClick={generatePDF} className="w-full ods-red-bg text-white font-bold py-3 rounded-lg shadow">Gerar Relatório PDF</button>
                        </div>
                    </div>
                    <div className="w-full lg:w-1/2 flex justify-center bg-gray-200 p-4 rounded-xl shadow-inner">
                        <div id="in-out-print-area" className="bg-white p-8 shadow h-fit text-sm w-full max-w-[700px]">
                            <div className="flex justify-between border-b-2 ods-red-border pb-4 mb-6"> <h1 className="text-lg font-black uppercase">Relatório Operacional ODS</h1> </div>
                            <div className="mb-4"> <p><strong>Técnico:</strong> {selectedEmp.name || '---'}</p> <p><strong>Data:</strong> {formatDateBR(state.outDate)} {state.returnDate ? ` até ${formatDateBR(state.returnDate)}` : ''}</p> <p><strong>Serviços:</strong> {state.selectedServices.join(', ')}</p> </div>
                            <div className="grid grid-cols-2 gap-4 mb-4"> <div className="border p-2"><strong>IN:</strong><p>{state.equipmentIn}</p></div> <div className="border p-2"><strong>OUT:</strong><p>{state.equipmentOut}</p></div> </div>
                            <table className="w-full border-collapse mb-4"><thead className="bg-gray-100"><tr><th className="p-1 border text-left">Checklist</th><th className="p-1 border text-center">Status</th></tr></thead><tbody>{state.tasks.map(t => <tr key={t.id}><td className="p-1 border">{t.text}</td><td className="p-1 border text-center font-bold">{t.status}</td></tr>)}</tbody></table>
                            <div className="mt-12 flex justify-between px-10 border-t pt-2 font-bold text-[10px]"> <span>Assinatura Técnico</span> <span>Assinatura Responsável</span> </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ActivityForm = ({ handleSaveActivities, daysOff, employees, showMessage, serviceTypes, locations }) => {
            const [data, setData] = useState({ sector: 'Service', startDate: '', endDate: '', empId: '', serviceType: '', location: '', desc: '' });
            const handleSubmit = (e) => {
                e.preventDefault();
                if(!data.startDate || !data.endDate || !data.empId) return showMessage('error', 'Preencha os campos obrigatórios.');
                const dates = getDatesInRange(data.startDate, data.endDate);
                const newActs = dates.map((date, i) => ({ id: Date.now() + i, date, employeeId: parseInt(data.empId), sector: data.sector, serviceType: data.serviceType, location: data.location, description: data.desc }));
                handleSaveActivities(newActs, data.startDate);
            };
            return (
                <div className="bg-white p-6 rounded-xl border max-w-2xl mx-auto w-full">
                    <h2 className="text-xl font-bold mb-6">+ Nova Atividade</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <select value={data.sector} onChange={e => setData({...data, sector: e.target.value})} className="p-2 border rounded"><option value="Service">Service</option><option value="Lab">Lab</option></select>
                            <select value={data.empId} onChange={e => setData({...data, empId: e.target.value})} className="p-2 border rounded"><option value="">Técnico...</option>{employees.filter(e => e.category === data.sector).map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>
                            <input type="date" value={data.startDate} onChange={e => setData({...data, startDate: e.target.value})} className="p-2 border rounded" />
                            <input type="date" value={data.endDate} onChange={e => setData({...data, endDate: e.target.value})} className="p-2 border rounded" />
                            <select value={data.serviceType} onChange={e => setData({...data, serviceType: e.target.value})} className="p-2 border rounded"><option value="">Serviço...</option>{serviceTypes.map(t => <option key={t} value={t}>{t}</option>)}</select>
                            <select value={data.location} onChange={e => setData({...data, location: e.target.value})} className="p-2 border rounded"><option value="">Local...</option>{locations.map(l => <option key={l} value={l}>{l}</option>)}</select>
                        </div>
                        <textarea placeholder="Descrição" value={data.desc} onChange={e => setData({...data, desc: e.target.value})} className="w-full p-2 border rounded" />
                        <button type="submit" className="w-full ods-red-bg text-white font-bold py-2 rounded">Salvar Atividade</button>
                    </form>
                </div>
            );
        };

        const DayOffForm = ({ handleSaveDaysOff, employees, showMessage, dayOffReasons }) => {
            const [data, setData] = useState({ empId: '', startDate: '', endDate: '', reason: '' });
            const handleSubmit = (e) => {
                e.preventDefault();
                if(!data.startDate || !data.empId) return showMessage('error', 'Campos obrigatórios.');
                const dates = getDatesInRange(data.startDate, data.endDate || data.startDate);
                const newOffs = dates.map((date, i) => ({ id: Date.now() + i, date, employeeId: parseInt(data.empId), reason: data.reason }));
                handleSaveDaysOff(newOffs, data.startDate);
            };
            return (
                <div className="bg-white p-6 rounded-xl border max-w-xl mx-auto w-full">
                    <h2 className="text-xl font-bold mb-6">+ Nova Folga</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <select value={data.empId} onChange={e => setData({...data, empId: e.target.value})} className="w-full p-2 border rounded"><option value="">Técnico...</option>{employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>
                        <div className="grid grid-cols-2 gap-4"><input type="date" value={data.startDate} onChange={e => setData({...data, startDate: e.target.value})} className="p-2 border rounded" /><input type="date" value={data.endDate} onChange={e => setData({...data, endDate: e.target.value})} className="p-2 border rounded" /></div>
                        <select value={data.reason} onChange={e => setData({...data, reason: e.target.value})} className="w-full p-2 border rounded"><option value="">Motivo...</option>{dayOffReasons.map(r => <option key={r} value={r}>{r}</option>)}</select>
                        <button type="submit" className="w-full ods-red-bg text-white font-bold py-2 rounded">Salvar Folga</button>
                    </form>
                </div>
            );
        };

        const ConfigView = ({ serviceTypes, locations, dayOffReasons, updateSettings, showMessage }) => {
            const [val, setVal] = useState({ s: '', l: '' });
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto w-full">
                    <div className="bg-white p-6 rounded-xl border">
                        <h3 className="font-bold mb-4">Tipos de Serviço</h3>
                        <div className="flex gap-2 mb-4"><input type="text" value={val.s} onChange={e => setVal({...val, s: e.target.value})} className="flex-1 p-2 border rounded" /><button onClick={() => { if(val.s) updateSettings('serviceTypes', [...serviceTypes, val.s]); setVal({...val, s: ''}); }} className="bg-red-600 text-white p-2 px-4 rounded">+</button></div>
                        <div className="space-y-1 max-h-40 overflow-y-auto">{serviceTypes.map(t => <div key={t} className="flex justify-between text-sm p-1 border-b"><span>{t}</span><button onClick={() => updateSettings('serviceTypes', serviceTypes.filter(i => i !== t))} className="text-red-500">&times;</button></div>)}</div>
                    </div>
                    <div className="bg-white p-6 rounded-xl border">
                        <h3 className="font-bold mb-4">Locais</h3>
                        <div className="flex gap-2 mb-4"><input type="text" value={val.l} onChange={e => setVal({...val, l: e.target.value})} className="flex-1 p-2 border rounded" /><button onClick={() => { if(val.l) updateSettings('locations', [...locations, val.l]); setVal({...val, l: ''}); }} className="bg-red-600 text-white p-2 px-4 rounded">+</button></div>
                        <div className="space-y-1 max-h-40 overflow-y-auto">{locations.map(l => <div key={l} className="flex justify-between text-sm p-1 border-b"><span>{l}</span><button onClick={() => updateSettings('locations', locations.filter(i => i !== l))} className="text-red-500">&times;</button></div>)}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoadingData, setIsLoadingData] = useState(true);
            const [activeTab, setActiveTab] = useState('agenda'); 
            const [message, setMessage] = useState(null); 
            const [currentDate, setCurrentDate] = useState(new Date(2026, 3, 1)); 
            const [selectedItem, setSelectedItem] = useState(null);
            const [employees] = useState(employeesList);
            const [activities, setActivities] = useState([]);
            const [daysOff, setDaysOff] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [serviceTypes, setServiceTypes] = useState([]);
            const [locations, setLocations] = useState([]);
            const [dayOffReasons, setDayOffReasons] = useState(["Férias", "Banco Horas", "LM", "Outros"]);
            
            const showMessage = (type, text) => { setMessage({ type, text }); setTimeout(() => setMessage(null), 4000); };

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const data = await CloudDB.fetchAll();
                        setActivities(data.activities || []);
                        setDaysOff(data.daysOff || []);
                        setInventory(data.inventory || []);
                        if (data.settings && data.settings[0]) {
                            const cfg = data.settings[0];
                            if (cfg.serviceTypes) setServiceTypes(cfg.serviceTypes);
                            if (cfg.locations) setLocations(cfg.locations);
                        }
                        setIsLoadingData(false);
                    } catch (err) { console.error(err); setIsLoadingData(false); }
                };
                loadData();
            }, []);

            const handleSaveActivities = async (newActs, startDate) => { for (const a of newActs) await CloudDB.put('activities', a); setActivities([...activities, ...newActs]); setCurrentDate(new Date(startDate + 'T12:00:00')); setActiveTab('agenda'); showMessage('success', 'Salvo!'); };
            const handleSaveDaysOff = async (newOffs, startDate) => { for (const o of newOffs) await CloudDB.put('daysOff', o); setDaysOff([...daysOff, ...newOffs]); setCurrentDate(new Date(startDate + 'T12:00:00')); setActiveTab('agenda'); showMessage('success', 'Salvo!'); };
            const deleteItem = async (type, id) => { await CloudDB.delete(type === 'activity' ? 'activities' : 'daysOff', id); if(type==='activity') setActivities(activities.filter(a => a.id !== id)); else setDaysOff(daysOff.filter(d => d.id !== id)); showMessage('success', 'Excluído!'); };
            const handleEditItem = async (item, vals) => { const store = item.isDayOff ? 'daysOff' : 'activities'; await CloudDB.put(store, {...item, ...vals}); if(item.isDayOff) setDaysOff(daysOff.map(d => d.id === item.id ? {...d, ...vals} : d)); else setActivities(activities.map(a => a.id === item.id ? {...a, ...vals} : a)); setSelectedItem(null); showMessage('success', 'Atualizado!'); };
            const updateSettings = async (key, val) => { let cfg = { id: 'config', serviceTypes, locations, dayOffReasons }; if(key === 'serviceTypes') { setServiceTypes(val); cfg.serviceTypes = val; } if(key === 'locations') { setLocations(val); cfg.locations = val; } await CloudDB.put('settings', cfg); };

            return (
                <div className="min-h-screen flex flex-col w-full">
                    <header className="ods-red-bg text-white shadow-md no-print p-3 flex flex-col xl:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-white px-3 py-1 rounded shadow-sm flex items-center">
                                <span className="text-red-600 font-black text-2xl italic tracking-tighter">ODS</span>
                                <span className="text-gray-800 font-bold text-[10px] leading-tight ml-1.5 border-l border-gray-400 pl-1.5">METERING<br/>SYSTEMS</span>
                            </div>
                        </div>
                        <div className="flex ods-red-bg-hover p-1 rounded-lg overflow-x-auto hide-scrollbar">
                            {['agenda', 'add-activity', 'add-dayoff', 'inventory', 'checklist', 'config'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-bold rounded-md transition-all ${activeTab === tab ? 'bg-white ods-red-text shadow' : 'text-white'}`}>{tab.replace('add-', '+ ').replace('checklist', 'In/Out').toUpperCase()}</button>
                            ))}
                        </div>
                    </header>
                    {message && <div className="px-4 mt-2"><div className={`p-3 rounded border text-sm ${message.type === 'error' ? 'bg-red-50 text-red-800' : 'bg-green-50 text-green-800'}`}>{message.text}</div></div>}
                    <main className="flex-1 p-4 flex flex-col">
                        {isLoadingData ? <div className="text-center py-20 font-bold text-gray-400">Conectando...</div> : (
                            <>
                                {activeTab === 'agenda' && <AgendaView activities={activities} daysOff={daysOff} employees={employees} currentDate={currentDate} setCurrentDate={setCurrentDate} setSelectedItem={setSelectedItem} showMessage={showMessage} />}
                                {activeTab === 'add-activity' && <ActivityForm handleSaveActivities={handleSaveActivities} daysOff={daysOff} employees={employees} showMessage={showMessage} serviceTypes={serviceTypes} locations={locations} />}
                                {activeTab === 'add-dayoff' && <DayOffForm handleSaveDaysOff={handleSaveDaysOff} employees={employees} showMessage={showMessage} dayOffReasons={dayOffReasons} />}
                                {activeTab === 'inventory' && <InventoryView inventory={inventory} setInventory={setInventory} showMessage={showMessage} />}
                                {activeTab === 'checklist' && <ChecklistInOutForm employees={employees} locations={locations} serviceTypes={serviceTypes} showMessage={showMessage} />}
                                {activeTab === 'config' && <ConfigView serviceTypes={serviceTypes} locations={locations} dayOffReasons={dayOffReasons} updateSettings={updateSettings} showMessage={showMessage} />}
                            </>
                        )}
                        <DetailsModal selectedItem={selectedItem} setSelectedItem={setSelectedItem} deleteItem={deleteItem} handleEdit={handleEditItem} serviceTypes={serviceTypes} locations={locations} dayOffReasons={dayOffReasons} />
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
