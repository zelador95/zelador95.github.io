                              <button onClick={() => handleInOutChange('accessories', 'OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.accessories === 'OK' ? 'bg-orange-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>OK</button>
                              <button onClick={() => handleInOutChange('accessories', 'NOT OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.accessories === 'NOT OK' ? 'bg-red-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>NOT OK</button>
                            </div>
                          </div>

                          <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-slate-50 p-4 rounded-xl gap-3">
                            <div className="mb-2 md:mb-0"><p className="font-bold text-sm">Operação do Equipamento</p><p className="text-xs text-slate-500">Equipamentos ligam e funcionam adequadamente.</p></div>
                            <div className="flex gap-2 w-full md:w-auto">
                              <button onClick={() => handleInOutChange('operation', 'OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.operation === 'OK' ? 'bg-orange-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>OK</button>
                              <button onClick={() => handleInOutChange('operation', 'NOT OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.operation === 'NOT OK' ? 'bg-red-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>NOT OK</button>
                            </div>
                          </div>
                        </div>
                      </div>

                      {checklistData.selectedEquipments.length > 0 && (isDryBlock || isBarometer || isCaliper) && (
                        <div className="mb-8 bg-orange-50 p-6 rounded-2xl border border-orange-100">
                          <h3 className="text-sm font-black text-orange-800 uppercase tracking-widest mb-4">Verificação Específica Necessária</h3>
                          
                          {isDryBlock && (
                            <div className="space-y-4 mb-6 pb-6 border-b border-orange-200 last:border-0 last:pb-0 last:mb-0">
                              <p className="text-sm font-bold text-slate-800">Forno Bloco Seco (Dry Block Thermal Bath)</p>
                              <div className="flex flex-wrap gap-2">
                                {['Working', 'Not Working', '0°C', '50°C'].map(status => (
                                  <button key={status} onClick={() => handleInOutChange('dryBlockStatus', status)} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all border ${checklistData.dryBlockStatus === status ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-slate-600 border-slate-200'}`}>{status}</button>
                                ))}
                              </div>
                              <input type="text" placeholder="Valor lido no display..." className="w-full bg-white border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-orange-500" value={checklistData.dryBlockValue} onChange={(e) => handleInOutChange('dryBlockValue', e.target.value)} />
                            </div>
                          )}

                          {isBarometer && (
                            <div className="space-y-4 mb-6 pb-6 border-b border-orange-200 last:border-0 last:pb-0 last:mb-0">
                              <p className="text-sm font-bold text-slate-800">Barômetro (Barometer)</p>
                              <p className="text-[10px] text-slate-500 uppercase tracking-wider font-bold">1: A diferença de valores atmosféricos não deve exceder 0,1 kPa</p>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" placeholder="Barometer AF" className="bg-white border border-slate-200 rounded-lg p-3 text-sm" value={checklistData.barometerAf} onChange={(e) => handleInOutChange('barometerAf', e.target.value)} />
                                <input type="text" placeholder="Atmospheric Value" className="bg-white border border-slate-200 rounded-lg p-3 text-sm" value={checklistData.barometerAtm} onChange={(e) => handleInOutChange('barometerAtm', e.target.value)} />
                              </div>
                            </div>
                          )}

                          {isCaliper && (
                            <div className="space-y-4 mb-6 pb-6 border-b border-orange-200 last:border-0 last:pb-0 last:mb-0">
                              <p className="text-sm font-bold text-slate-800">Paquímetro (Caliper)</p>
                              <p className="text-[10px] text-slate-500 uppercase tracking-wider font-bold">2: A diferença do Bloco Padrão e o Valor Lido não deve exceder 0,03 mm</p>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input type="text" placeholder="Caliper AF" className="bg-white border border-slate-200 rounded-lg p-3 text-sm" value={checklistData.caliperAf} onChange={(e) => handleInOutChange('caliperAf', e.target.value)} />
                                <input type="text" placeholder="Standard block (mm)" className="bg-white border border-slate-200 rounded-lg p-3 text-sm" value={checklistData.caliperBlock} onChange={(e) => handleInOutChange('caliperBlock', e.target.value)} />
                                <input type="text" placeholder="Value (mm)" className="bg-white border border-slate-200 rounded-lg p-3 text-sm" value={checklistData.caliperValue} onChange={(e) => handleInOutChange('caliperValue', e.target.value)} />
                              </div>
                            </div>
                          )}
                        </div>
                      )}

                      <div className="mb-8">
                        <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Comentários (Non-conforming work)</label>
                        <textarea className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-medium focus:ring-2 focus:ring-red-500 h-24 resize-none" placeholder="Detalhes caso algum equipamento esteja NOT OK..." value={checklistData.comments} onChange={(e) => handleInOutChange('comments', e.target.value)}></textarea>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Verificado por</label>
                          <input type="text" className="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-semibold focus:ring-2 focus:ring-red-500" value={checklistData.verifier} onChange={(e) => handleInOutChange('verifier', e.target.value)} />
                        </div>
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Aprovado por</label>
                          <input type="text" className="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-semibold focus:ring-2 focus:ring-red-500" value={checklistData.approver} onChange={(e) => handleInOutChange('approver', e.target.value)} />
                        </div>
                      </div>

                      <div className="flex flex-col md:flex-row gap-4 mt-8 pt-6 border-t border-slate-100">
                        <button 
                          onClick={() => {
                            setReportMode(true);
                            setTimeout(() => printReport(), 800);
                          }}
                          disabled={checklistData.selectedEquipments.length === 0 || isSaving}
                          className="flex-1 bg-slate-100 text-slate-700 py-4 rounded-2xl font-black tracking-wide hover:bg-slate-200 transition-colors disabled:opacity-50"
                        >
                          Gerar Relatório
                        </button>
                        <button 
                          onClick={handleSaveAndGenerate}
                          disabled={checklistData.selectedEquipments.length === 0 || isSaving}
                          className="flex-[2] bg-red-600 text-white py-4 rounded-2xl font-black tracking-wide hover:bg-red-700 transition-colors disabled:opacity-50 flex justify-center items-center gap-3 shadow-lg shadow-red-500/30"
                        >
                          {isSaving ? (
                            <><RefreshCw size={20} className="animate-spin" /> Guardando...</>
                          ) : (
                            <><CloudUpload size={20} /> Guardar no Sheets e Gerar</>
                          )}
                        </button>
                      </div>

                    </div>
                  </div>
                )}

                {/* --- IMPRESSÃO RELATÓRIO IN/OUT --- */}
                {reportMode && activeTab === 'checklist' && (
                  <div className="max-w-4xl mx-auto bg-white rounded-none md:rounded-[2rem] shadow-none md:shadow-xl border-0 md:border border-slate-200 p-8 md:p-12 print:p-0 print:shadow-none print:border-0 print:max-w-none print-area">
                    
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-8 border-b border-dashed border-slate-200 print:hidden">
                      <button onClick={() => setReportMode(false)} className="flex items-center gap-2 text-slate-500 hover:text-slate-900 font-bold transition-colors w-full md:w-auto justify-center">
                        <ArrowLeft size={20} /> Voltar ao Formulário
                      </button>
                      <button onClick={printReport} className="flex items-center justify-center gap-2 bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition-colors w-full md:w-auto">
                        <Printer size={20} /> Imprimir / PDF
                      </button>
                    </div>

                    <div className="text-center mb-10">
                      <img 
                        src="dog%20ods.png" 
                        alt="ODS Metering Systems Logo" 
                        className="h-16 w-auto mx-auto mb-4 print:h-12" 
                        onError={(e) => { e.target.style.display = 'none'; }}
                      />
                      <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tight">Formulário de {checklistData.type === 'IN' ? 'Entrada' : 'Saída'}</h1>
                      <p className="text-slate-500 font-bold tracking-widest uppercase mt-2">Equipment {checklistData.type}</p>
                    </div>

                    <table className="w-full mb-8 border-collapse border border-slate-800 text-sm">
                      <tbody>
                        <tr>
                          <td className="border border-slate-800 p-3 font-bold bg-slate-100 w-1/4">Data (Date):</td>
                          <td className="border border-slate-800 p-3 w-1/4">{checklistData.date}</td>
                          <td className="border border-slate-800 p-3 font-bold bg-slate-100 w-1/4">Finalidade (Objective):</td>
                          <td className="border border-slate-800 p-3 w-1/4">{checklistData.objective}</td>
                        </tr>
                        <tr>
                          <td className="border border-slate-800 p-3 font-bold bg-slate-100">De (From):</td>
                          <td className="border border-slate-800 p-3">{checklistData.from}</td>
                          <td className="border border-slate-800 p-3 font-bold bg-slate-100">Para (To):</td>
                          <td className="border border-slate-800 p-3">{checklistData.to}</td>
                        </tr>
                        <tr>
                          <td className="border border-slate-800 p-3 font-bold bg-slate-100 align-top">Equipamentos:</td>
                          <td className="border border-slate-800 p-3" colSpan="3">
                            <ul className="list-decimal pl-5 space-y-1.5">
                              {checklistData.selectedEquipments.map(eq => {
                                const equipName = eq["equipment_2"] || eq["equipment"];
                                const af = eq["af"] || eq["número af"] || eq["af dimensional"];
                                const code = eq["ods code"] || eq["af dimensional"] || "S/ CODIGO";
                                
                                return (
                                  <li key={eq.id}>
                                    <span className="font-semibold">{equipName}</span>
                                    <span className="font-mono text-xs ml-2 bg-slate-200 px-2 py-0.5 rounded">
                                      ODS: {code} {af && af !== code ? `| AF: ${af}` : ''}
                                    </span>
                                  </li>
                                );
                              })}
                            </ul>
                          </td>
                        </tr>
                      </tbody>
                    </table>

                    <div className="mb-8">
                      <h3 className="font-bold text-lg bg-slate-800 text-white p-2 mb-4 uppercase text-center text-sm tracking-widest">Equipment Condition Verification</h3>
                      <table className="w-full border-collapse border border-slate-800 text-sm">
                        <tbody>
                          <tr>
                            <td className="border border-slate-800 p-3 w-3/4"><strong>Identification and integrity:</strong> check that there is no apparent damage to the equipment and its box.</td>
                            <td className={`border border-slate-800 p-3 text-center font-bold align-middle ${checklistData.integrity === 'NOT OK' ? 'text-red-600 bg-red-50' : 'text-slate-800'}`}>{checklistData.integrity || 'N/A'}</td>
                          </tr>
                          <tr>
                            <td className="border border-slate-800 p-3 w-3/4">
                              <strong>Accessories:</strong> check that all accessories are present, without apparent damage.<br/>
                              <div className="text-xs text-slate-500 font-normal italic mt-2">
                                Expected Accessories:
                                <ul className="list-disc pl-4 mt-1">
                                  {checklistData.selectedEquipments.map(eq => {
                                    const equipName = eq["equipment_2"] || eq["equipment"];
                                    const code = eq["ods code"] || eq["af dimensional"] || "S/ CODIGO";
                                    return (
                                      <li key={eq.id}><strong>{code}</strong>: {getExpectedAccessories(equipName)}</li>
                                    )
                                  })}
                                </ul>
                              </div>
                            </td>
                            <td className={`border border-slate-800 p-3 text-center font-bold align-middle ${checklistData.accessories === 'NOT OK' ? 'text-red-600 bg-red-50' : 'text-slate-800'}`}>{checklistData.accessories || 'N/A'}</td>
                          </tr>
                          <tr>
                            <td className="border border-slate-800 p-3 w-3/4"><strong>Equipment operation:</strong> check if the equipment is switching on and working properly.</td>
                            <td className={`border border-slate-800 p-3 text-center font-bold align-middle ${checklistData.operation === 'NOT OK' ? 'text-red-600 bg-red-50' : 'text-slate-800'}`}>{checklistData.operation || 'N/A'}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>

                    {(isDryBlock || isBarometer || isCaliper) && (
                      <div className="mb-8 border-2 border-slate-800 p-4 relative">
                        <span className="absolute -top-3 left-4 bg-white px-2 font-bold text-xs">SPECIFIC VERIFICATION</span>
                        
                        {isDryBlock && (
                          <div className="mb-4">
                            <p className="font-bold mb-2">Dry Block Thermal Bath</p>
                            <p className="text-sm mb-1">Status: <span className="font-bold">{checklistData.dryBlockStatus || 'N/A'}</span></p>
                            <p className="text-sm">Value verified: <span className="font-bold">{checklistData.dryBlockValue || 'N/A'}</span></p>
                          </div>
                        )}

                        {isBarometer && (
                          <div className="mb-4">
                            <p className="font-bold mb-2">Barometer</p>
                            <p className="text-sm mb-1">Barometer AF: <span className="font-bold">{checklistData.barometerAf || 'N/A'}</span></p>
                            <p className="text-sm mb-2">Atmospheric value: <span className="font-bold">{checklistData.barometerAtm || 'N/A'}</span></p>
                            <p className="text-xs italic text-slate-500">1: The difference of atmospheric values shall not exceed 0,1 kPa</p>
                          </div>
                        )}

                        {isCaliper && (
                          <div>
                            <p className="font-bold mb-2">Caliper</p>
                            <p className="text-sm mb-1">Caliper AF: <span className="font-bold">{checklistData.caliperAf || 'N/A'}</span></p>
                            <p className="text-sm mb-1">Standard block (mm): <span className="font-bold">{checklistData.caliperBlock || 'N/A'}</span></p>
                            <p className="text-sm mb-2">Value (mm): <span className="font-bold">{checklistData.caliperValue || 'N/A'}</span></p>
                            <p className="text-xs italic text-slate-500">2: The difference from Standard Block and Value (read on caliper) shall not exceed 0,03 mm</p>
                          </div>
                        )}
                      </div>
                    )}

                    <div className="mb-12">
                      <p className="font-bold text-sm mb-2">Comments (Non-conforming work):</p>
                      <div className="border border-slate-400 min-h-[80px] p-3 text-sm rounded">
                        {checklistData.comments || <span className="text-slate-300 italic">No comments...</span>}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-12 mt-16 text-sm">
                      <div className="text-center">
                        <div className="border-b border-slate-800 pb-1 mb-2 min-h-[30px] font-bold text-lg font-signature">
                          {checklistData.verifier}
                        </div>
                        <p className="font-bold">Verificado por (Verified by)</p>
                      </div>
                      <div className="text-center">
                        <div className="border-b border-slate-800 pb-1 mb-2 min-h-[30px] font-bold text-lg font-signature">
                          {checklistData.approver}
                        </div>
                        <p className="font-bold">Aprovado por (Approved by)</p>
                      </div>
                    </div>

                  </div>
                )}
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
