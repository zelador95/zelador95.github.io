        // --- INJEÇÃO DINÂMICA DO PWA (Service Worker e Manifest) ---
        (function setupPWA() {
            // 1. Configurar Manifest do PWA
            const manifest = {
                "name": "ODS Metering Systems",
                "short_name": "ODS Metering",
                "description": "Painel Operacional e Estoque ODS",
                "start_url": ".",
                "display": "standalone",
                "background_color": "#f3f4f6",
                "theme_color": "#dc2626",
                "icons": [
                    {
                        "src": "https://ods-metering.com/wp-content/uploads/2024/09/ODS-METERING-SYSTEMS-LOGO-V2.png",
                        "sizes": "192x192",
                        "type": "image/png"
                    },
                    {
                        "src": "https://ods-metering.com/wp-content/uploads/2024/09/ODS-METERING-SYSTEMS-LOGO-V2.png",
                        "sizes": "512x512",
                        "type": "image/png"
                    }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

            // 2. Configurar Service Worker para funcionar offline
            // Bloqueado silenciosamente no ambiente de Preview Canvas pois protocolos 'blob:' para SW não são suportados.
            // Irá funcionar normalmente quando for hospedado.
            if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
                try {
                    const swCode = `
                        self.addEventListener('install', (e) => { self.skipWaiting(); });
                        self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
                        self.addEventListener('fetch', (e) => {
                            e.respondWith(fetch(e.request).catch(() => new Response('App Offline')));
                        });
                    `;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                        .then(() => console.log('PWA Configurado com sucesso.'))
                        .catch(err => console.log('Aviso do PWA (ignorado em preview local/canvas):', err.message));
                } catch(e) {
                    console.log('Ambiente não suporta ServiceWorkers dinâmicos. PWA será ativado na hospedagem final.');
                }
            }
        })();
    </script>

        const LocalDB = {
            db: null,
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('ODSMeteringDB', 2);
                    request.onerror = (e) => reject(e.target.error);
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('activities')) db.createObjectStore('activities', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('daysOff')) db.createObjectStore('daysOff', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains('inventory')) db.createObjectStore('inventory', { keyPath: 'barcode' });
                    };
                });
            },
            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async put(storeName, item) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const req = store.put(item);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    const req = store.delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }
        };

            const date = new Date(start + 'T12:00:00');
            const endDate = new Date(end + 'T12:00:00');
            const dates = [];
            while (date <= endDate) {
                dates.push(date.toISOString().split('T')[0]);
                date.setDate(date.getDate() + 1);

                                        </select>
                                    ) : (
                                        <p className="font-medium text-orange-900">{selectedItem.reason}</p>
                                    )}
                                </div>
                            )}
                            
                            {!selectedItem.isDayOff && (
                                <div>
                                    <p className="text-[11px] uppercase tracking-wider text-gray-500 font-semibold mb-1">Descrição / Motivo</p>
                                    {isEditing ? (
                                        <textarea 
                                            value={editData.description} 
                                            onChange={(e) => setEditData({...editData, description: e.target.value})} 
                                            className="w-full border border-gray-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all" 
                                            rows="3"
                                        />
                                    ) : (
                                        <p className="font-medium text-gray-800 text-sm bg-white border border-gray-200 p-3 rounded-lg shadow-inner min-h-[3rem] whitespace-pre-wrap">{selectedItem.description}</p>
                                    )}
                                </div>
                            )}
                        </div>
                        
                        <div className="p-4 bg-gray-50 border-t border-gray-100 flex justify-between gap-3 items-center">
                            {isEditing ? (
                                <>
                                    <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg font-medium transition-colors">Cancelar</button>
                                    <button onClick={onSaveEdit} className="px-5 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors shadow-sm">Salvar Alterações</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={() => { deleteItem(selectedItem.isDayOff ? 'dayOff' : 'activity', selectedItem.spanIds || selectedItem.id); setSelectedItem(null); }} className="px-3 py-1.5 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white border border-red-200 hover:border-red-500 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors shadow-sm">
                                        <TrashIcon /> Excluir
                                    </button>
                                    <button onClick={() => setSelectedItem(null)} className="px-5 py-1.5 text-gray-700 bg-white border border-gray-300 hover:bg-gray-100 rounded-lg text-sm font-medium transition-colors shadow-sm">Fechar</button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- ABA DE ESTOQUE (INVENTORY VIEW) ---
        const InventoryView = ({ inventory, setInventory, showMessage }) => {
            const [barcodeInput, setBarcodeInput] = useState('');
            const [qtyInput, setQtyInput] = useState(1);
            const [opType, setOpType] = useState('in');
            const [isScanning, setIsScanning] = useState(false);
            
            const [newItemModal, setNewItemModal] = useState(null);
            const [newItemName, setNewItemName] = useState('');

            const [showBarcodeModal, setShowBarcodeModal] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                let html5QrcodeScanner;
                if (isScanning) {
                    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 150 } }, false);
                    html5QrcodeScanner.render((decodedText) => {
                        setBarcodeInput(decodedText);
                        setIsScanning(false);
                        try { html5QrcodeScanner.clear(); } catch(e){}
                        showMessage('success', `Código lido: ${decodedText}`);
                    }, (errorMessage) => { /* ignora erros contínuos do scanner */ });
                }
                return () => {
                    if(html5QrcodeScanner) {
                        try { html5QrcodeScanner.clear(); } catch(e){}
                    }
                };
            }, [isScanning]);

            useEffect(() => {
                if (showBarcodeModal && showBarcodeModal.barcode) {
                    setTimeout(() => {
                        try {
                            JsBarcode("#barcode-canvas", showBarcodeModal.barcode, {
                                format: "CODE128", 
                                lineColor: "#000",
                                width: 2,
                                height: 80,
                                displayValue: true
                            });
                        } catch(e) {
                            console.error("Erro ao gerar barcode:", e);
                        }
                    }, 50);
                }
            }, [showBarcodeModal]);

            const handleOperation = async (e) => {
                if(e) e.preventDefault();
                if(!barcodeInput.trim() || qtyInput <= 0) {
                    showMessage('error', 'Preencha o código de barras e uma quantidade válida.');
                    return;
                }

                const code = barcodeInput.trim();
                const existingItem = inventory.find(i => i.barcode === code);

                if (!existingItem) {
                    setNewItemModal({ barcode: code, type: opType, qty: qtyInput });
                    return;
                }

                let newQty = opType === 'in' ? existingItem.quantity + parseInt(qtyInput) : existingItem.quantity - parseInt(qtyInput);
                if (newQty < 0) {
                    showMessage('error', `Estoque insuficiente! Existem apenas ${existingItem.quantity} unidades de ${existingItem.name}.`);
                    return;
                }
                
                const updatedItem = { ...existingItem, quantity: newQty, lastUpdated: new Date().toISOString() };
                
                try {
                    await LocalDB.put('inventory', updatedItem);
                    setInventory(inventory.map(i => i.barcode === code ? updatedItem : i));
                    showMessage('success', `Operação realizada! Novo estoque de ${updatedItem.name}: ${newQty}`);
                    setBarcodeInput('');
                    setQtyInput(1);
                } catch(err) {
                    showMessage('error', 'Erro ao salvar no banco de dados.');
                }
            };

            const saveNewItem = async (e) => {
                e.preventDefault();
                if(!newItemName.trim()) return;

                const newQty = newItemModal.type === 'in' ? parseInt(newItemModal.qty) : 0;
                const item = { 
                    barcode: newItemModal.barcode, 
                    name: newItemName.trim(), 
                    quantity: newQty, 
                    lastUpdated: new Date().toISOString() 
                };

                try {
                    await LocalDB.put('inventory', item);
                    setInventory([...inventory, item]);
                    setNewItemModal(null);
                    setNewItemName('');
                    setBarcodeInput('');
                    setQtyInput(1);
                    if(newItemModal.type === 'out' && parseInt(newItemModal.qty) > 0) {
                        showMessage('error', 'Item cadastrado com estoque ZERO. Não foi possível realizar a saída.');
                    } else {
                        showMessage('success', `Item "${item.name}" cadastrado com sucesso!`);
                    }
                } catch(err) {
                    showMessage('error', 'Erro ao cadastrar novo item.');
                }
            };

            const deleteInventoryItem = async (barcode) => {
                if(!window.confirm("Tem certeza que deseja excluir este item permanentemente?")) return;
                try {
                    await LocalDB.delete('inventory', barcode);
                    setInventory(inventory.filter(i => i.barcode !== barcode));
                    showMessage('success', 'Item excluído do estoque.');
                } catch(err) {
                    showMessage('error', 'Erro ao excluir item.');
                }
            };

            const filteredInventory = inventory.filter(i => 
                i.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                i.barcode.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full max-w-6xl mx-auto w-full">
                    <div className="w-full lg:w-1/3 space-y-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 no-print">
                            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <BarcodeIcon /> Lançamento Rápido
                            </h2>
                            
                            <div className="flex bg-gray-100 p-1 rounded-lg mb-6">
                                <button 
                                    onClick={() => setOpType('in')}
                                    className={`flex-1 py-2 rounded-md text-sm font-bold transition-colors ${opType === 'in' ? 'bg-green-500 text-white shadow' : 'text-gray-500 hover:text-green-600'}`}
                                >ENTRADA (+)</button>
                                <button 
                                    onClick={() => setOpType('out')}
                                    className={`flex-1 py-2 rounded-md text-sm font-bold transition-colors ${opType === 'out' ? 'bg-orange-500 text-white shadow' : 'text-gray-500 hover:text-orange-600'}`}
                                >SAÍDA (-)</button>
                            </div>

                            {isScanning ? (
                                <div className="mb-4 border-2 border-red-500 rounded-lg overflow-hidden relative">
                                    <div id="reader" className="w-full bg-black"></div>
                                    <button onClick={() => setIsScanning(false)} className="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded shadow z-50">Fechar Câmera</button>
                                </div>
                            ) : (
                                <button onClick={() => setIsScanning(true)} className="w-full mb-4 bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                    <CameraIcon /> Escanear com a Câmera
                                </button>
                            )}

                            <div className="relative mb-4 flex items-center">
                                <div className="flex-grow border-t border-gray-200"></div>
                                <span className="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase font-medium">OU DIGITE</span>
                                <div className="flex-grow border-t border-gray-200"></div>
                            </div>

                            <form onSubmit={handleOperation} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Código de Barras</label>
                                    <input 
                                        type="text" 
                                        value={barcodeInput} 
                                        onChange={(e) => setBarcodeInput(e.target.value)} 
                                        placeholder="Ex: AF1234"
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none font-mono text-center tracking-widest bg-gray-50 uppercase"
                                        autoFocus
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Quantidade</label>
                                    <input 
                                        type="number" 
                                        min="1"
                                        value={qtyInput} 
                                        onChange={(e) => setQtyInput(e.target.value)} 
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-center font-bold text-lg"
                                    />
                                </div>
                                <button type="submit" className={`w-full text-white font-bold py-3 rounded-lg shadow-sm transition-colors uppercase tracking-wider ${opType === 'in' ? 'bg-green-600 hover:bg-green-700' : 'bg-orange-500 hover:bg-orange-600'}`}>
                                    Registrar {opType === 'in' ? 'Entrada' : 'Saída'}
                                </button>
                            </form>
                        </div>
                    </div>

                    <div className="w-full lg:w-2/3 bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col max-h-[80vh] no-print">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <PackageIcon /> Controle de Estoque
                            </h2>
                            <div className="w-full md:w-64 relative">
                                <input 
                                    type="text" 
                                    placeholder="Buscar item ou código..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full p-2 pl-8 border border-gray-300 rounded-lg text-sm focus:border-red-500 outline-none"
                                />
                                <svg className="w-4 h-4 text-gray-400 absolute left-2.5 top-2.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar border border-gray-200 rounded-lg">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-gray-100 sticky top-0 z-10 shadow-sm">
                                    <tr className="text-gray-600 text-[10px] uppercase tracking-wider">
                                        <th className="p-3 border-b border-gray-200 font-bold">Item / Ferramenta</th>
                                        <th className="p-3 border-b border-gray-200 font-bold text-center">Código</th>
                                        <th className="p-3 border-b border-gray-200 font-bold text-center">Estoque</th>
                                        <th className="p-3 border-b border-gray-200 font-bold text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredInventory.length === 0 ? (
                                        <tr><td colSpan="4" className="p-8 text-center text-gray-500 italic">Nenhum item encontrado no estoque.</td></tr>
                                    ) : (
                                        filteredInventory.map(item => (
                                            <tr key={item.barcode} className="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                                <td className="p-3">
                                                    <div className="font-semibold text-gray-800">{item.name}</div>
                                                    <div className="text-[9px] text-gray-400">Atualizado: {new Date(item.lastUpdated).toLocaleDateString('pt-BR')}</div>
                                                </td>
                                                <td className="p-3 text-center">
                                                    <span className="font-mono text-xs bg-gray-100 px-2 py-1 rounded text-gray-600 uppercase">{item.barcode}</span>
                                                </td>
                                                <td className="p-3 text-center">
                                                    <span className={`font-bold text-sm px-2 py-1 rounded-full ${item.quantity > 5 ? 'bg-green-100 text-green-800' : item.quantity > 0 ? 'bg-orange-100 text-orange-800' : 'bg-red-100 text-red-800'}`}>
                                                        {item.quantity} un
                                                    </span>
                                                </td>
                                                <td className="p-3 text-right">
                                                    <button onClick={() => setShowBarcodeModal(item)} className="text-blue-600 hover:text-blue-800 p-1.5 bg-blue-50 hover:bg-blue-100 rounded transition-colors mr-2" title="Gerar Etiqueta">
                                                        <BarcodeIcon />
                                                    </button>
                                                    <button onClick={() => deleteInventoryItem(item.barcode)} className="text-red-500 hover:text-red-700 p-1.5 hover:bg-red-50 rounded transition-colors" title="Excluir">
                                                        <TrashIcon />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* MODAL: NOVO ITEM */}
                    {newItemModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4 no-print">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden p-6 border-t-4 border-red-600">
                                <h3 className="font-bold text-lg text-gray-800 mb-2">Código não cadastrado!</h3>
                                <p className="text-sm text-gray-600 mb-4">O código <strong className="font-mono uppercase">{newItemModal.barcode}</strong> não existe no sistema. Deseja cadastrá-lo agora?</p>
                                
                                <form onSubmit={saveNewItem}>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">Nome do Item / Equipamento</label>
                                    <input 
                                        type="text" 
                                        value={newItemName}
                                        onChange={(e) => setNewItemName(e.target.value)}
                                        placeholder="Ex: Alicate Amperímetro Fluke..."
                                        className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none mb-6"
                                        autoFocus
                                        required
                                    />
                                    <div className="flex justify-end gap-3">
                                        <button type="button" onClick={() => setNewItemModal(null)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">Cancelar</button>
                                        <button type="submit" className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition-colors shadow-sm">Salvar Cadastro</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: IMPRIMIR ETIQUETA BARCODE */}
                    {showBarcodeModal && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
                                <div className="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center no-print">
                                    <h3 className="font-bold text-gray-800">Etiqueta de Equipamento</h3>
                                    <button onClick={() => setShowBarcodeModal(null)} className="text-gray-500 hover:text-gray-800">&times;</button>
                                </div>
                                
                                <div className="p-8 flex flex-col items-center justify-center bg-white print-barcode w-full h-full">
                                    <p className="font-bold text-center text-gray-800 text-sm mb-2">{showBarcodeModal.name}</p>
                                    <canvas id="barcode-canvas" className="max-w-full"></canvas>
                                    <p className="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-semibold">ODS METERING SYSTEMS</p>
                                </div>

                                <div className="p-4 bg-gray-50 border-t border-gray-200 flex justify-end no-print">
                                    <button onClick={() => window.print()} className="px-5 py-2 bg-gray-800 hover:bg-gray-900 text-white rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2">
                                        <DownloadIcon /> Imprimir Etiqueta
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TELAS ---
        const AgendaView = ({ activities, daysOff, employees, currentDate, setCurrentDate, selectedItem, setSelectedItem, showMessage, handleImportCSV }) => {
            const [filterSector, setFilterSector] = useState('');
            const [filterEmployee, setFilterEmployee] = useState('');
            const fileInputRef = useRef(null);

            const year = currentDate.getFullYear();
            const monthsArray = Array.from({ length: 12 }, (_, i) => i);
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

            const prevYear = () => setCurrentDate(new Date(year - 1, 0, 1));
            const nextYear = () => setCurrentDate(new Date(year + 1, 0, 1));

            const allDays = useMemo(() => {
                const days = [];
                for (let m = 0; m < 12; m++) {
                    const dInM = new Date(year, m + 1, 0).getDate();
                    for (let d = 1; d <= dInM; d++) {
                        const dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                        const isWeekend = new Date(year, m, d).getDay() === 0 || new Date(year, m, d).getDay() === 6;
                        days.push({ month: m, day: d, dateStr, isWeekend });
                    }
                }
                return days;
            }, [year]);

            const combinedAgenda = useMemo(() => {
                let items = [];
                activities.forEach(a => items.push({...a, isDayOff: false}));
                daysOff.forEach(d => items.push({...d, isDayOff: true, description: d.reason}));
                return items;
            }, [activities, daysOff]);

            const agendaMap = useMemo(() => {
                const map = {};
                combinedAgenda.forEach(act => {
                    map[`${act.employeeId}-${act.date}`] = act;
                });
                return map;
            }, [combinedAgenda]);

            const filteredEmployees = useMemo(() => {
                return employees.filter(emp => {
                    const matchSector = filterSector ? emp.category === filterSector : true;
                    const matchEmployee = filterEmployee ? emp.id === parseInt(filterEmployee) : true;
                    return matchSector && matchEmployee;
                });
            }, [employees, filterSector, filterEmployee]);

            const exportToExcel = () => {
                showMessage('success', 'Preparando Excel, aguarde...');
                const header = ['Colaborador', 'Setor', ...allDays.map(d => `${d.day}/${d.month + 1}`)];
                const data = [header];

                filteredEmployees.forEach(emp => {
                    const row = [emp.name, emp.category];
                    allDays.forEach(day => {
                        const act = agendaMap[`${emp.id}-${day.dateStr}`];
                        if (act) {
                            if (act.isDayOff) row.push(`Folga (${act.description})`);
                            else row.push(`${act.sector} - ${act.serviceType}`);
                        } else {
                            row.push(''); 
                        }
                    });
                    data.push(row);
                });

                setTimeout(() => {
                    const ws = XLSX.utils.aoa_to_sheet(data);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, `Escala ${year}`);
                    XLSX.writeFile(wb, `Escala_Completa_${year}.xlsx`);
                }, 100);
            };

            const downloadImportTemplate = () => {
                const header = ['Colaborador', 'Tipo (Atividade/Folga)', 'Data Inicio', 'Data Fim', 'Tipo Servico', 'Localidade', 'Descricao', 'Motivo'];
                const demoData = [
                    ['Marcio Martirios', 'Atividade', '2026-05-10', '2026-05-12', 'Instalação', 'Filial Norte', 'Instalação de equipamento X', ''],
                    ['Phamela Carvalho', 'Folga', '2026-05-15', '2026-05-15', '', '', '', 'Férias']
                ];
                const ws = XLSX.utils.aoa_to_sheet([header, ...demoData]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, `Modelo`);
                XLSX.writeFile(wb, `Modelo_Importacao_ODS.xlsx`);
                showMessage('success', 'Planilha modelo transferida! Preencha as colunas e use o botão "Importar".');
            };

            const onFileChange = (e) => {
                const file = e.target.files[0];
                if(file) handleImportCSV(file);
                e.target.value = null; 
            };

            const exportToPDF = () => {
                showMessage('success', 'Gerando PDF panorâmico, por favor aguarde...');
                const element = document.getElementById('print-area-agenda');
                const originalOverflow = element.style.overflow;
                element.style.overflow = 'visible';

                const opt = {
                    margin:       0.2,
                    filename:     `Escala_Completa_${year}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, windowWidth: element.scrollWidth }, 
                    jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    element.style.overflow = originalOverflow;
                }).catch(err => {
                    console.error(err);
                    showMessage('error', 'Erro ao gerar PDF.');
                    element.style.overflow = originalOverflow;
                });
            };

            useEffect(() => {
                const container = document.getElementById('print-area-agenda');
                if (container) {
                    const monthIndex = currentDate.getMonth();
                    const targetScroll = (monthIndex * 30 * 40) + 150; 
                    container.scrollLeft = targetScroll - 200;
                }
            }, [currentDate]);

            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <CalendarIcon /> Painel de Escala Contínuo
                        </h2>
                        
                        <div className="flex items-center gap-4 bg-gray-50 p-2 rounded-lg border border-gray-200">
                            <button onClick={prevYear} className="p-1.5 hover:bg-white hover:shadow-sm rounded text-gray-600 transition-all font-medium text-xs">&lt; Ano Ant.</button>
                            <span className="font-bold text-gray-800 min-w-[80px] text-center tracking-wide text-lg">{year}</span>
                            <button onClick={nextYear} className="p-1.5 hover:bg-white hover:shadow-sm rounded text-gray-600 transition-all font-medium text-xs">Próx. Ano &gt;</button>
                        </div>

                        <div className="flex gap-3 text-xs md:text-sm font-medium bg-gray-50 py-2 px-3 rounded-lg border border-gray-100 no-print">
                            <div className="flex items-center gap-1.5"><span className="w-3 h-3 status-service-legend-bg rounded-full shadow-sm"></span> Service</div>
                            <div className="flex items-center gap-1.5"><span className="w-3 h-3 status-lab-legend-bg rounded-full shadow-sm"></span> Lab</div>
                            <div className="flex items-center gap-1.5"><span className="w-3 h-3 status-dayoff-legend-bg rounded-full shadow-sm"></span> Folga</div>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between gap-4 bg-gray-50 p-2 rounded-lg border border-gray-200 mb-4 no-print">
                        <div className="flex flex-col md:flex-row gap-4">
                            <div className="flex items-center gap-2">

                    <div id="print-area-agenda" className="flex-1 overflow-auto max-h-[70vh] border border-gray-200 rounded-lg shadow-inner bg-white custom-scrollbar relative w-full">
                        <table className="text-left border-collapse min-w-max w-full">
                            <thead className="sticky top-0 z-40 bg-gray-100 shadow-[0_2px_5px_rgba(0,0,0,0.05)]">
                                <tr className="text-gray-600 text-[10px] uppercase tracking-wider">
                                    <th rowSpan="2" className="sticky left-0 top-0 bg-gray-200 p-2 border-b border-r border-gray-300 z-50 w-[150px] min-w-[150px] shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] align-middle">
                                        Colaborador
                                    </th>

                                        const daysInMonth = new Date(year, m + 1, 0).getDate();
                                        return (
                                            <th key={m} colSpan={daysInMonth} className="p-1 border-b border-r border-gray-300 text-center font-bold bg-gray-200 text-[11px] text-gray-800">
                                                {monthNames[m]}
                                            </th>
                                        );
                                    })}
                                </tr>
                                <tr className="text-gray-600 text-[9px] bg-gray-100">
                                    {allDays.map((dayObj, i) => (
                                        <th key={i} className={`p-0.5 border-b border-r border-gray-200 text-center font-semibold w-10 min-w-[2.5rem] max-w-[2.5rem] ${dayObj.isWeekend ? 'bg-gray-300 text-gray-600' : ''}`}>
                                            {dayObj.day}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {filteredEmployees.length === 0 ? (
                                    <tr>
                                        <td colSpan={allDays.length + 1} className="p-8 text-center text-gray-500">
                                            Nenhum colaborador encontrado.
                                        </td>
                                    </tr>
                                ) : (
                                    filteredEmployees.map((emp) => {
                                        const cells = [];
                                        let dIndex = 0;
                                        
                                        while (dIndex < allDays.length) {
                                            const currentDay = allDays[dIndex];
                                            const act = agendaMap[`${emp.id}-${currentDay.dateStr}`];

                                            if (act) {
                                                let span = 1;
                                                let nextDIndex = dIndex + 1;
                                                let spanIds = [act.id];

                                                while (nextDIndex < allDays.length) {
                                                    const nextDay = allDays[nextDIndex];
                                                    const nextAct = agendaMap[`${emp.id}-${nextDay.dateStr}`];
                                                    
                                                    if (nextAct && 
                                                        nextAct.isDayOff === act.isDayOff &&
                                                        nextAct.sector === act.sector &&
                                                        nextAct.serviceType === act.serviceType &&
                                                        nextAct.location === act.location &&
                                                        nextAct.description === act.description) {
                                                        span++;
                                                        spanIds.push(nextAct.id);
                                                        nextDIndex++;
                                                    } else {
                                                        break;
                                                    }
                                                }
                                                const endDateStr = allDays[nextDIndex - 1].dateStr;
                                                cells.push({ type: 'activity', day: currentDay, span, act: { ...act, spanIds, endDateStr } });
                                                dIndex = nextDIndex;
                                            } else {
                                                cells.push({ type: 'empty', day: currentDay, span: 1 });
                                                dIndex++;
                                            }
                                        }

                                        return (
                                            <tr key={emp.id} className="border-b border-gray-100 hover:bg-gray-50/50 group">
                                                <td className="sticky left-0 bg-white group-hover:bg-gray-50 p-1.5 text-xs border-r border-gray-300 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] transition-colors truncate w-[150px] min-w-[150px]">

                                                        return <td key={cell.day.dateStr} className={`p-0 border-r border-gray-100 text-center relative ${cell.day.isWeekend ? 'bg-gray-50' : ''}`}></td>
                                                    } else {
                                                        const act = cell.act;
                                                        let bgClass = "bg-transparent text-white";
                                                        
                                                        if (act.isDayOff) bgClass = "status-dayoff-bg status-dayoff-bg-hover status-dayoff-border";
                                                        else if (act.sector === 'Service') bgClass = "status-service-bg status-service-bg-hover status-service-border";
                                                        else bgClass = "status-lab-bg status-lab-bg-hover status-lab-border";

                                                        return (
                                                            <td key={cell.day.dateStr} colSpan={cell.span} className="p-[2px] border-r border-gray-100 relative">
                                                                <div 
                                                                    onClick={() => setSelectedItem({ ...act, employee: emp })}
                                                                    className={`w-full h-8 rounded-[4px] px-1.5 shadow-sm cursor-pointer transition-all flex flex-col justify-center overflow-hidden border whitespace-nowrap ${bgClass}`}
                                                                    title={act.isDayOff ? `Folga - ${act.description}` : `${act.location} \n${act.serviceType}\n${act.description}`}
                                                                >
                                                                    {act.isDayOff ? (
                                                                        <div className="font-bold text-[9px] truncate w-full flex items-center justify-center tracking-wider">
                                                                            FOLGA
                                                                        </div>
                                                                    ) : (
                                                                        <>
                                                                            <div className="font-bold text-[10px] leading-[1.1] truncate w-full">{act.location}</div>
                                                                            <div className="text-[8px] leading-[1.1] opacity-90 truncate w-full">{act.serviceType}</div>
                                                                        </>
                                                                    )}
                                                                </div>
                                                            </td>
                                                        );
                                                    }
                                                })}
                                            </tr>
                                        );
                                    })
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

                e.preventDefault();

                    showMessage('error', 'Por favor, preencha todos os campos.');
                    return;
                }

                if (parseInt(startDate.split('-')[0]) < 2023) {
                    showMessage('error', 'A data selecionada não pode ser anterior ao ano de 2023.');
                    return;
                }

                if (new Date(startDate) > new Date(endDate)) {
                    showMessage('error', 'A data final deve ser maior ou igual à data inicial.');
                    return;
                }

                const dates = getDatesInRange(startDate, endDate);
                const hasConflict = daysOff.some(d => d.employeeId === parseInt(empId) && dates.includes(d.date));
                
                if (hasConflict) {
                    showMessage('error', 'Conflito! Este colaborador possui FOLGA em um ou mais dias do período selecionado.');

                    id: Date.now() + index,

                    sector,
                    serviceType,
                    location,
                    description: desc

                if (new Date(startDate) > new Date(endDate)) {
