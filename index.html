        const getExpectedAccessories = (equipName) => {
          if (!equipName) return "N/A";
          const name = equipName.toLowerCase();
          if (name.includes('pneumatic pump') || name.includes('hydraulic pump')) return "Conexões, Mangueiras";
          if (name.includes('multi calibrator')) return "Cabos, Carregador";
          if (name.includes('profundity')) return "N/A";
          if (name.includes('megometer') || name.includes('thermohygrometer') || name.includes('micrômetro') || name.includes('micrometer')) return "Pilhas";
          if (name.includes('probe temperature')) return "Sensor";
          if (name.includes('kit de manômetros') || name.includes('manometer')) return "Completo";
          if (name.includes('dry block') || name.includes('bloco seco')) return "Cabo de energia";
          if (name.includes('hart') || name.includes('field xpert')) return "Moblink, Carregador, Cabos comunicação, Resistor 250 ohm, Field Xpert";
          if (name.includes('caliper') || name.includes('paquímetro')) return "Bateria";
          if (name.includes('bore gauge') || name.includes('bore gage') || name.includes('dial gauge') || name.includes('dial gage')) return "Bateria, relógio, ponteiras e calços";
          if (name.includes('angle transferer') || name.includes('goniometro')) return "Régua do transferidor";
          if (name.includes('water draw')) return "Mangueiras transparentes, abraçadeiras 1/2\" e 3/8\", teflon, fita isolante";
          if (name.includes('caixa de instrumentação')) return "Cabos, tomada e extensão industrial";
          if (name.includes('leak test')) return "Mangueiras Inox 1/2\" e 1/4\", manômetro diferencial, cronômetro";
          return "Verificar manual/padrão";
        };

            dryBlockValue: '',
            barometerAf: '',

            caliperAf: '',
            caliperBlock: '',
            caliperValue: ''
          });

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                setIsLocationDropdownOpen(false);
              }
            };
            document.addEventListener('mousedown', handleClickOutside);
            return () => document.removeEventListener('mousedown', handleClickOutside);
          }, []);

          useEffect(() => {
            fetchData();
            loadPdfs();
          }, []);

          // --- INTEGRAÇÃO DE PDFS NO GOOGLE DRIVE ---
          const loadPdfs = async () => {
            setIsLoadingPdfs(true);
            try {
              const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'list_pdfs' }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
              });
              const result = await response.json();
              if (result.status === 'sucesso') {
                setPdfs(result.files);
              }
            } catch (err) {
              console.error("Erro ao carregar PDFs do Drive:", err);
            } finally {
              setIsLoadingPdfs(false);
            }
          };

          const handleFileUpload = async (e) => {
              const file = e.target.files[0];
              if (!file || file.type !== 'application/pdf') {
                  setPrintMessage("Por favor, selecione um arquivo PDF.");
                  setTimeout(() => setPrintMessage(''), 3000);
                  return;
              }

              setIsUploadingPdf(true);
              setPrintMessage("Enviando PDF para o Google Drive...");

              const reader = new FileReader();
              reader.onload = async () => {
                  const base64Data = reader.result.split(',')[1];
                  try {
                      const response = await fetch(GAS_URL, {
                          method: 'POST',
                          body: JSON.stringify({ 
                              action: 'upload_pdf', 
                              filename: file.name, 
                              base64: base64Data 
                          }),
                          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                      });
                      const result = await response.json();
                      
                      if (result.status === 'sucesso') {
                          setPdfs(prev => [...prev, { id: result.id, name: result.name, url: result.url, date: result.date }]);
                          setPrintMessage("PDF guardado no Google Drive com sucesso!");
                      } else {
                          setPrintMessage("Erro ao guardar o PDF.");
                      }
                      setTimeout(() => setPrintMessage(''), 3000);
                  } catch (err) {
                      console.error(err);
                      setPrintMessage("Erro de conexão.");
                      setTimeout(() => setPrintMessage(''), 3000);
                  } finally {
                      setIsUploadingPdf(false);
                      e.target.value = null; // reset input
                  }
              };
              reader.readAsDataURL(file);
          };

          const handleDownloadPdf = (pdf) => {
              window.open(pdf.url, '_blank'); // Abre a janela do Drive para baixar
          };

          const handleViewPdf = (pdf) => {
              const previewUrl = `https://drive.google.com/file/d/${pdf.id}/preview`;
              setViewingPdf({ url: previewUrl, name: pdf.name });
          };

          const handleDeletePdf = async (id) => {
              if(!window.confirm("Tem certeza que deseja excluir este PDF do Google Drive?")) return;
              try {
                  setPrintMessage("A excluir do Drive...");
                  await fetch(GAS_URL, {
                      method: 'POST',
                      body: JSON.stringify({ action: 'delete_pdf', fileId: id }),
                      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                  });
                  setPdfs(prev => prev.filter(p => p.id !== id));
                  setPrintMessage("PDF excluído com sucesso.");
                  setTimeout(() => setPrintMessage(''), 3000);
              } catch (err) {
                  console.error("Erro ao deletar", err);
                  setPrintMessage("Erro ao excluir PDF.");
                  setTimeout(() => setPrintMessage(''), 3000);
              }
          };

          const parseCSV = (text) => {
            const lines = text.split('\n').filter(line => line.trim() !== "");
            if (lines.length === 0) return [];
            
            const splitCsvLine = (str) => {
              const result = [];
              let curVal = '';
              let inQuotes = false;
              for (let i = 0; i < str.length; i++) {
                if (str[i] === '"') {
                  inQuotes = !inQuotes;
                } else if (str[i] === ',' && !inQuotes) {
                  result.push(curVal);
                  curVal = '';
                } else {
                  curVal += str[i];
                }
              }
              result.push(curVal);
              return result.map(v => v.trim().replace(/^"|"$/g, ''));
            };

            const rawHeaders = splitCsvLine(lines[0]).map(h => h.toLowerCase());
            
            const headerCounts = {};
            const headers = rawHeaders.map(h => {
              if (headerCounts[h]) {
                headerCounts[h]++;
                return `${h}_${headerCounts[h]}`;
              } else {
                headerCounts[h] = 1;
                return h;
              }
            });
            
            return lines.slice(1).map((line, index) => {
              const values = splitCsvLine(line);
              const obj = { id: index };
              headers.forEach((header, i) => {
                obj[header] = values[i] || "";
              });
              return obj;
            }).filter(item => {
              const hasOds = item["ods code"] && item["ods code"].toLowerCase() !== "ods code";
              const hasAfDim = item["af dimensional"] && item["af dimensional"].toLowerCase() !== "af dimensional";
              return hasOds || hasAfDim;
            }); 
          };

          const fetchData = async () => {
            if (!SHEET_URL) return;
            setLoading(true);
            try {
              const response = await fetch(SHEET_URL);
              const text = await response.text();
              const parsedData = parseCSV(text);
              setInventory(parsedData);
            } catch (error) {
              console.error("Erro ao buscar dados:", error);
            } finally {
              setLoading(false);
            }
          };

          const uniqueLocations = ['Todas', ...new Set(inventory.map(item => item["equipment location"]).filter(loc => loc))];

          const filteredInventory = inventory.filter(item => {
            const searchStr = searchTerm.toLowerCase();
            const afValue = String(item["af"] || item["número af"] || item["af dimensional"] || "").toLowerCase();
            const equipName = String(item["equipment"] || item["equipment_2"] || "").toLowerCase();
            
            const matchesSearch = 
              equipName.includes(searchStr) || 
              String(item["ods code"] || "").toLowerCase().includes(searchStr) ||
              afValue.includes(searchStr) ||
              String(item["equipment location"] || "").toLowerCase().includes(searchStr);
            const matchesLocation = selectedLocation === 'Todas' || item["equipment location"] === selectedLocation;
            return matchesSearch && matchesLocation;
          });

          const handleInOutChange = (field, value) => {
            setChecklistData(prev => ({ ...prev, [field]: value }));
          };

          const handleTypeChange = (newType) => {
            setEquipmentSearchTerm(''); 
            setChecklistData(prev => ({ 
              ...prev, 
              type: newType, 
              selectedEquipments: [],
              from: newType === 'OUT' ? 'ODS Lab' : prev.to,
              to: newType === 'IN' ? 'ODS Lab' : ''
            }));
          };

          const handleAddEquipment = (e) => {
            const eqId = e.target.value;
            if (!eqId) return;
            const eq = inventory.find(i => String(i.id) === eqId);
            if (eq && !checklistData.selectedEquipments.some(item => item.id === eq.id)) {
              handleInOutChange('selectedEquipments', [...checklistData.selectedEquipments, eq]);
            }
            setEquipmentSearchTerm(''); 
          };

          const handleRemoveEquipment = (id) => {
            handleInOutChange(
              'selectedEquipments',
              checklistData.selectedEquipments.filter(item => item.id !== id)
            );
          };

          const handleDispatchItemChange = (itemName, field, value) => {
            setDispatchData(prev => ({
              ...prev,
              items: {
                ...prev.items,
                [itemName]: {
                  ...prev.items[itemName],
                  [field]: value
                }
              }
            }));
          };

          const handleDispatchItemArrayChange = (itemName, newCode) => {
            if (!newCode) return;
            setDispatchData(prev => {
              const currentItem = prev.items[itemName] || {};
              const currentCodes = currentItem.codes || [];
              if (currentCodes.includes(newCode)) return prev;
              return {
                ...prev,
                items: {
                  ...prev.items,
                  [itemName]: {
                    ...currentItem,
                    codes: [...currentCodes, newCode]
                  }
                }
              };
            });
          };

          const handleRemoveDispatchItemArray = (itemName, codeToRemove) => {
            setDispatchData(prev => {
              const currentItem = prev.items[itemName] || {};
              const currentCodes = currentItem.codes || [];
              return {
                ...prev,
                items: {
                  ...prev.items,
                  [itemName]: {
                    ...currentItem,
                    codes: currentCodes.filter(c => c !== codeToRemove)
                  }
                }
              };
            });
          };

          const handleDispatchCheckChange = (checkName, value) => {
            setDispatchData(prev => ({
              ...prev,
              checks: { ...prev.checks, [checkName]: value }
            }));
          };

          const handleSaveLocation = async (item) => {
            if (!newLocationValue.trim()) return;
            
            setIsUpdatingLocation(true);
            const updatePayload = {
              type: 'ATUALIZAÇÃO MANUAL',
              from: item["equipment location"],
              to: newLocationValue,
              objective: 'Correção de Estoque',
              selectedEquipments: [{
                ...item,
                equipment: item.equipment_2 || item.equipment || 'Equipamento Atualizado'
              }],
              integrity: 'N/A',
              accessories: 'N/A',
              operation: 'N/A',
              comments: 'Atualização feita direto pela tela de inventário.',
              verifier: 'Sistema',
              approver: 'Sistema',
              date: new Date().toISOString().split('T')[0]
            };

            try {
              await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(updatePayload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
              });
              
              setInventory(prev => prev.map(inv => 
                inv.id === item.id ? { ...inv, "equipment location": newLocationValue } : inv
              ));
              
              setPrintMessage(`Localização atualizada com sucesso!`);
              setTimeout(() => setPrintMessage(''), 4000);
              setEditingLocationId(null);
            } catch (error) {
              console.error("Erro ao atualizar:", error);
              setPrintMessage("Erro ao atualizar localização.");
              setTimeout(() => setPrintMessage(''), 4000);
            } finally {
              setIsUpdatingLocation(false);
            }
          };

          const handleKitSelection = (e) => {
            const kitName = e.target.value;
            
            if (!kitName) {
              setDispatchData(prev => ({ ...prev, selectedKit: kitName }));
              return;
            }

            const kitCodes = KITS_FPSO[kitName] || [];

            const kitInventoryItems = inventory.filter(inv => {
              const invCode = String(inv["ods code"] || "").replace(/\s/g, '').toUpperCase();
              const invAf = String(inv["af"] || inv["número af"] || "").replace(/\s/g, '').toUpperCase();
              return kitCodes.some(code => code.toUpperCase() === invCode || code.toUpperCase() === invAf);
            });

            const newItems = { ...dispatchData.items };

            CHECKLIST_TEMPLATES["Temperatura e Pressão"].forEach(item => {
              let cleanItemNames = item.name
                .toLowerCase()
                .split('(')[0]
                .split('- qtd')[0]
                .split('- ver aba')[0]
                .split('/')
                .map(s => s.trim());

              const isManometer = item.name.includes("Kit de Manômetros");
              const isDryBlock = item.name.includes("Dry Block Calibrator");
              const isMulti = isManometer || isDryBlock;

              if (isManometer) cleanItemNames = ["manometer", "manômetro"];

              const matchedItems = kitInventoryItems.filter(inv => {
                const invName = String(inv["equipment_2"] || inv["equipment"] || inv["equipamento"] || "").toLowerCase();
                return cleanItemNames.some(cleanName => invName.includes(cleanName) || cleanName.includes(invName));
              });

              if (matchedItems.length > 0) {
                if (isMulti) {
                  newItems[item.name] = { codes: matchedItems.map(m => m["ods code"]), obs: "OK" };
                } else {
                  newItems[item.name] = { code: matchedItems[0]["ods code"], obs: "OK" };
                }
              } else {
                newItems[item.name] = isMulti ? { codes: [], obs: "" } : { code: "", obs: "" };
              }
            });

            setDispatchData(prev => ({
              ...prev,
              selectedKit: kitName,
              items: newItems
            }));
          };

          const printReport = () => {
            try {
              window.print();
              setPrintMessage("Dica: Se a janela de impressão não abriu, utilize o atalho Ctrl + P (ou Cmd + P).");
              setTimeout(() => setPrintMessage(''), 8000);
            } catch (e) {
              setPrintMessage("A impressão direta foi bloqueada pelo navegador. Pressione Ctrl + P para imprimir.");
              setTimeout(() => setPrintMessage(''), 8000);
            }
          };

          const handlePrintDispatch = () => {
            const selectedCodes = [];
            Object.values(dispatchData.items).forEach(item => {
              if (item.code && item.code.trim() !== "") selectedCodes.push(item.code);
              if (item.codes && Array.isArray(item.codes)) selectedCodes.push(...item.codes);
            });

            const equipmentsToTransfer = inventory.filter(inv => 
              selectedCodes.includes(inv["ods code"])
            );

            if (equipmentsToTransfer.length > 0) {
              setChecklistData(prev => {
                const existingIds = new Set(prev.selectedEquipments.map(e => e.id));
                const newEquipments = equipmentsToTransfer.filter(e => !existingIds.has(e.id));
                
                return {
                  ...prev,
                  type: 'OUT',
                  from: 'ODS Lab',
                  to: dispatchData.destination || prev.to, 
                  selectedEquipments: [...prev.selectedEquipments, ...newEquipments]
                };
              });
            }

            setDispatchReportMode(true);
            setTimeout(() => printReport(), 800);
          };

          const handleSaveAndGenerate = async () => {
            if (!GAS_URL || checklistData.to.trim() === '') {
              setPrintMessage("Por favor, preencha o destino (Para) antes de guardar.");
              setTimeout(() => setPrintMessage(''), 5000);
              return;
            }
            
            setIsSaving(true);
            try {
              await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(checklistData),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
              });
              
              const novoDestino = checklistData.to;
              const idEquipamentosSelecionados = checklistData.selectedEquipments.map(eq => eq.id);
              
              setInventory(prevInventory => 
                prevInventory.map(item => {
                  if (idEquipamentosSelecionados.includes(item.id)) {
                    return { ...item, "equipment location": novoDestino };
                  }
                  return item;
                })
              );

              setReportMode(true);
              setTimeout(() => printReport(), 800);
            } catch (error) {
              console.error("Erro ao guardar no Sheets:", error);
              setPrintMessage("Erro ao comunicar com a folha de cálculo. A gerar relatório offline.");
              setTimeout(() => setPrintMessage(''), 5000);
              setReportMode(true);
            } finally {
              setIsSaving(false);
            }
          };

          const isDryBlock = checklistData.selectedEquipments.some(eq => {
            const name = (eq.equipment || eq.equipment_2 || "").toLowerCase();
            return name.includes('dry block') || name.includes('bloco seco');
          });
          const isBarometer = checklistData.selectedEquipments.some(eq => {
            const name = (eq.equipment || eq.equipment_2 || "").toLowerCase();
            return name.includes('barometer') || name.includes('barômetro');
          });
          const isCaliper = checklistData.selectedEquipments.some(eq => {
            const name = (eq.equipment || eq.equipment_2 || "").toLowerCase();
            return name.includes('caliper') || name.includes('paquímetro');
          });

          const availableEquipmentsForChecklist = inventory.filter(item => {
            const loc = String(item["equipment location"] || "").toLowerCase();
            const isLab = loc.includes('ods lab') || loc === 'ods';
            const matchesType = checklistData.type === 'OUT' ? isLab : !isLab;
            
            if (!matchesType) return false;

            if (equipmentSearchTerm) {
              const searchStr = equipmentSearchTerm.toLowerCase();
              const afValue = String(item["af"] || item["número af"] || item["af dimensional"] || "").toLowerCase();
              const equipName = String(item["equipment"] || item["equipment_2"] || "").toLowerCase();
              
              return (
                equipName.includes(searchStr) || 
                String(item["ods code"] || "").toLowerCase().includes(searchStr) ||
                afValue.includes(searchStr)
              );
            }
            return true;
          });

          const renderDispatchRows = () => {
            return CHECKLIST_TEMPLATES[dispatchData.type].map((item, idx) => {
              let cleanItemNames = item.name
                .toLowerCase()
                .split('(')[0]
                .split('- qtd')[0]
                .split('- ver aba')[0]
                .split('/')
                .map(s => s.trim());

              const isManometer = item.name.includes("Kit de Manômetros");
              const isBoreGauge = item.name.includes("Bore Gauge");
              const isDryBlock = item.name.includes("Dry Block Calibrator");
              
              const isMulti = isManometer || isBoreGauge || isDryBlock;

              if (isManometer) {
                cleanItemNames = ["manometer", "manômetro"];
              } else if (isBoreGauge) {
                cleanItemNames = ["bore gauge", "bore gage", "dial gauge", "dial gage"];
              }

              let filteredOptions = inventory.filter(inv => {
                const invName = String(inv["equipment_2"] || inv["equipment"] || inv["equipamento"] || "").toLowerCase();
                
                if (item.name === "Caliper" && invName.includes("hook caliper")) {
                  return false;
                }

                return cleanItemNames.some(cleanName => invName.includes(cleanName) || cleanName.includes(invName));
              });

              if (filteredOptions.length === 0) {
                filteredOptions = inventory;
              }

              return (
                <tr key={idx} className="hover:bg-slate-50 transition-colors">
                  <td className="p-4 font-bold text-slate-800">{item.name}</td>
                  <td className="p-4 text-slate-500 text-xs italic">{item.accessories}</td>
                  <td className="p-4">
                    {isMulti ? (
                      <div className="flex flex-col gap-2">
                        <select 
                          className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs font-semibold focus:ring-2 focus:ring-red-500"
                          value=""
                          onChange={(e) => handleDispatchItemArrayChange(item.name, e.target.value)}
                        >
                          <option value="">-- Adicionar ODS --</option>
                          {filteredOptions.map(inv => (
                            <option key={inv.id} value={inv["ods code"]}>
                              {inv["ods code"]} {inv.af ? `(${inv.af})` : ''} - {inv.equipment || inv.equipment_2}
                            </option>
                          ))}
                        </select>
                        
                        {dispatchData.items[item.name]?.codes?.length > 0 && (
                          <div className="flex flex-wrap gap-1.5">
                            {dispatchData.items[item.name].codes.map(c => (
                              <span key={c} className="bg-red-50 text-red-700 px-2 py-1 rounded-md text-[10px] font-bold border border-red-200 flex items-center gap-1.5 shadow-sm">
                                {c}
                                <button 
                                  onClick={() => handleRemoveDispatchItemArray(item.name, c)}
                                  className="bg-red-200 hover:bg-red-300 rounded-full p-0.5 transition-colors"
                                >
                                  <X size={10} className="text-red-800" />
                                </button>
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    ) : (
                      <select 
                        className={`w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs font-semibold focus:ring-2 focus:ring-red-500 ${dispatchData.items[item.name]?.code ? 'border-red-400 bg-red-50' : ''}`}
                        value={dispatchData.items[item.name]?.code || ''}
                        onChange={(e) => handleDispatchItemChange(item.name, 'code', e.target.value)}
                      >
                        <option value="">-- Selecionar ODS / N/A --</option>
                        {filteredOptions.map(inv => (
                          <option key={inv.id} value={inv["ods code"]}>
                            {inv["ods code"]} {inv.af ? `(${inv.af})` : ''} - {inv.equipment || inv.equipment_2}
                          </option>
                        ))}
                      </select>
                    )}
                  </td>
                  <td className="p-4">
                    <input 
                      type="text" 
                      className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs focus:ring-2 focus:ring-red-500" 
                      placeholder="OK / Status..."
                      value={dispatchData.items[item.name]?.obs || ''}
                      onChange={(e) => handleDispatchItemChange(item.name, 'obs', e.target.value)}
                    />
                  </td>
                </tr>
              );
            });
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans flex print:bg-white print:m-0">
              
              {/* Toast Notification */}
              {printMessage && (
                <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-2xl z-50 flex items-center gap-3 animate-in fade-in slide-in-from-bottom-5 border border-slate-700 max-w-sm print:hidden">
                  <Info className="text-orange-400 shrink-0" size={24} />
                  <p className="text-sm font-semibold">{printMessage}</p>
                </div>
              )}

              {/* OVERLAY PARA O MENU MOBILE */}
              {isMobileMenuOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 lg:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>
              )}

              {/* OVERLAY PARA VISUALIZAÇÃO DE PDF DO DRIVE */}
              {viewingPdf && (
                <div className="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col p-4 md:p-8 animate-in fade-in">
                    <div className="flex justify-between items-center mb-4 text-white">
                        <h3 className="text-xl font-bold truncate pr-4 flex items-center gap-3">
                          <FileText size={24} className="text-red-500" /> {viewingPdf.name}
                        </h3>
                        <button onClick={() => { setViewingPdf(null); }} className="bg-slate-800 hover:bg-slate-700 p-2 rounded-xl transition-colors">
                            <X size={24} />
                        </button>
                    </div>
                    <iframe src={viewingPdf.url} className="w-full flex-1 rounded-2xl bg-white border-0 shadow-2xl" title={viewingPdf.name}></iframe>
                </div>
              )}

              {/* HEADER MOBILE */}
              <div className="lg:hidden fixed top-0 left-0 right-0 bg-slate-900 text-white p-4 flex justify-between items-center z-30 shadow-md print:hidden">
                <div className="flex items-center gap-3">
                  <div className="bg-white p-1 rounded-lg shadow-sm flex justify-center items-center">
                    <img src="dog%20ods.png" alt="ODS Logo" className="h-6 w-auto" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                    <Package size={18} className="text-red-600 hidden" />
                  </div>
                  <h1 className="text-lg font-black tracking-tight uppercase">ODS Systems</h1>
                </div>
                <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors">
                  <Menu size={24} />
                </button>
              </div>

              {/* SIDEBAR */}
              <aside className={`fixed inset-y-0 left-0 w-72 lg:w-64 bg-slate-900 text-white p-6 flex flex-col shadow-2xl print:hidden z-50 transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                
                <button className="lg:hidden absolute top-5 right-5 text-gray-400 hover:text-white" onClick={() => setIsMobileMenuOpen(false)}>
                    <X size={24} />
                </button>

                <div className="flex items-center gap-3 mb-10 mt-2 lg:mt-0">
                  <div className="bg-white p-2 rounded-xl shadow-lg shadow-red-500/20 flex justify-center items-center">
                    <img 
                      src="dog%20ods.png" 
                      alt="ODS Metering Systems Logo" 
                      className="h-8 w-auto" 
                      onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }}
                    />
                    <Package size={24} className="text-red-600 hidden" />
                  </div>
                  <h1 className="text-xl font-black tracking-tight uppercase">ODS Metering Systems</h1>
                </div>
                
                <nav className="flex-1 space-y-2">
                  <button 
                    onClick={() => { setActiveTab('inventory'); setReportMode(false); setDispatchReportMode(false); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'inventory' ? 'bg-red-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}
                  >
                    <LayoutDashboard size={20} /> Inventário ODS
                  </button>
                  
                  <button 
                    onClick={() => { setActiveTab('dispatch'); setReportMode(false); setDispatchReportMode(false); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dispatch' ? 'bg-red-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}
                  >
                    <ClipboardList size={20} /> Checklist de Saída
                  </button>

                  <button 
                    onClick={() => { setActiveTab('checklist'); setReportMode(false); setDispatchReportMode(false); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'checklist' ? 'bg-red-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}
                  >
                    <ClipboardCheck size={20} /> Relatório IN/OUT
                  </button>

                  <button 
                    onClick={() => { setActiveTab('procedures'); setReportMode(false); setDispatchReportMode(false); setIsMobileMenuOpen(false); }}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'procedures' ? 'bg-red-600 shadow-lg' : 'hover:bg-slate-800 text-slate-400'}`}
                  >
                    <FileText size={20} /> Procedimentos
                  </button>
                </nav>

                <div className="mt-auto p-5 bg-slate-800/40 rounded-2xl border border-slate-700/50 hidden lg:block">
                   <div className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest mb-2 text-red-400">
                     <FileSpreadsheet size={14} /> Base de Dados
                   </div>
                   <p className="text-[11px] text-orange-400 font-bold">Sincronização OK</p>
                </div>
              </aside>

              <main className="flex-1 lg:ml-64 p-4 md:p-8 pt-24 lg:pt-8 print:p-0 print:m-0 w-full">
                
                {(!reportMode && !dispatchReportMode) && (
                  <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10 print:hidden">
                    <div>
                      <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight italic uppercase">
                        {activeTab === 'inventory' && 'Localização de Equipamentos'}
                        {activeTab === 'dispatch' && 'Checklist de Verificação de Saída'}
                        {activeTab === 'checklist' && 'Relatório Oficial de Entrada e Saída'}
                        {activeTab === 'procedures' && 'Procedimentos e Manuais'}
                      </h2>
                      {activeTab === 'inventory' && (
                        <div className="flex items-center gap-2 mt-1">
                          <div className={`h-2 w-2 rounded-full ${loading ? 'bg-red-500 animate-pulse' : 'bg-orange-500'}`}></div>
                          <p className="text-slate-500 text-xs font-bold uppercase tracking-wide">
                            {loading ? 'A sincronizar...' : 'Dados Sincronizados'}
                          </p>
                        </div>
                      )}
                    </div>

                    {activeTab === 'inventory' && (
                      <button 
                        onClick={fetchData}
                        disabled={loading}
                        className="bg-white border border-slate-200 p-3 rounded-xl hover:bg-slate-50 transition shadow-sm active:scale-90"
                      >
                        <RefreshCw size={20} className={loading ? "animate-spin text-red-600" : "text-slate-600"} />
                      </button>
                    )}
                  </header>
                )}

                {/* --- ABA 1: INVENTÁRIO --- */}
                {activeTab === 'inventory' && !reportMode && !dispatchReportMode && (
                  <div className="animate-in fade-in duration-300">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                      <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex items-center justify-between group hover:border-red-200 transition-colors">
                        <div>
                          <h3 className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">
                            {searchTerm || selectedLocation !== 'Todas' ? 'Resultados Encontrados' : 'Equipamentos Totais'}
                          </h3>
                          <p className={`text-4xl md:text-5xl font-black ${searchTerm || selectedLocation !== 'Todas' ? 'text-red-600' : 'text-slate-900'}`}>
                            {filteredInventory.length}
                          </p>
                        </div>
                        <div className="p-4 rounded-2xl bg-red-50 text-red-600 group-hover:bg-red-600 group-hover:text-white transition-all hidden sm:block">
                          <ListIcon size={32} />
                        </div>
                      </div>

                      <div className="relative" ref={dropdownRef}>
                        <button 
                          onClick={() => setIsLocationDropdownOpen(!isLocationDropdownOpen)}
                          className={`w-full bg-white p-6 md:p-8 rounded-3xl shadow-sm border flex items-center justify-between group transition-all text-left ${selectedLocation !== 'Todas' ? 'border-red-500 ring-2 ring-red-50' : 'border-slate-100 hover:border-orange-200'}`}
                        >
                          <div>
                            <div className="flex items-center gap-2 text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">
                              Localizações Distintas <ChevronDown size={12} className={`transition-transform ${isLocationDropdownOpen ? 'rotate-180' : ''}`} />
                            </div>
                            <p className="text-4xl md:text-5xl font-black text-slate-900">
                              {selectedLocation === 'Todas' ? uniqueLocations.length - 1 : 1}
                            </p>
                            {selectedLocation !== 'Todas' && <span className="text-[10px] font-bold text-red-600 uppercase mt-2 block">Filtro: {selectedLocation}</span>}
                          </div>
                          <div className={`p-4 rounded-2xl transition-all hidden sm:block ${selectedLocation !== 'Todas' ? 'bg-red-600 text-white' : 'bg-orange-50 text-orange-600 group-hover:bg-orange-600 group-hover:text-white'}`}>
                            <MapPin size={32} />
                          </div>
                        </button>

                        {isLocationDropdownOpen && (
                          <div className="absolute top-full left-0 right-0 mt-3 bg-white border border-slate-100 rounded-2xl shadow-xl z-50 max-h-64 overflow-y-auto animate-in fade-in slide-in-from-top-2 custom-scrollbar">
                            <div className="p-2 space-y-1">
                              {uniqueLocations.map((loc, idx) => (
                                <button
                                  key={idx}
                                  onClick={() => { setSelectedLocation(loc); setIsLocationDropdownOpen(false); }}
                                  className={`w-full text-left px-4 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-between ${selectedLocation === loc ? 'bg-red-50 text-red-700' : 'hover:bg-slate-50 text-slate-600'}`}
                                >
                                  {loc}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                      <div className="p-6 md:p-8 border-b border-slate-50 flex items-center justify-between gap-4">
                        <div className="relative flex-1">
                          <Search className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300" size={22} />
                          <input 
                            type="text" 
                            placeholder="Pesquisar por ODS, AF, Equipamento ou Local..."
                            className="w-full pl-14 pr-6 py-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-red-500 text-sm md:text-base font-medium transition-all shadow-inner"
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                          />
                        </div>
                        {(searchTerm || selectedLocation !== 'Todas') && (
                          <button onClick={() => { setSelectedLocation('Todas'); setSearchTerm(''); }} className="bg-orange-50 text-orange-600 px-4 py-4 rounded-2xl hover:bg-orange-100 transition-colors">
                            <X size={20} />
                          </button>
                        )}
                      </div>

                      <datalist id="inventory-locations-list">
                        {uniqueLocations.filter(loc => loc !== 'Todas').map((loc, idx) => (
                          <option key={idx} value={loc} />
                        ))}
                      </datalist>

                      <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-left table-auto min-w-[600px]">
                          <thead>
                            <tr className="bg-slate-50/50">
                              <th className="px-6 md:px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-widest w-48">Identificação</th>
                              <th className="px-6 md:px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-widest">Equipamento</th>
                              <th className="px-6 md:px-10 py-6 text-[11px] font-black text-slate-400 uppercase tracking-widest">Localização</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {filteredInventory.length > 0 ? filteredInventory.map((item, idx) => {
                                const af = item["af"] || item["número af"] || item["af dimensional"];
                                const equipName = item["equipment_2"] || item["equipment"];
                                const odsCode = item["ods code"] || item["af dimensional"] || "S/ CODIGO";
                                
                                return (
                                  <tr key={idx} className="hover:bg-red-50/30 transition-colors group">
                                    <td className="px-6 md:px-10 py-6 align-top">
                                      <div className="flex flex-col gap-1.5">
                                        <span className="inline-block bg-slate-900 text-white px-3 py-1 rounded-lg font-mono text-xs font-bold shadow-sm w-fit whitespace-nowrap">
                                          {odsCode}
                                        </span>
                                        {af && af !== odsCode && <span className="text-red-600 font-black text-xs md:text-sm tracking-tight px-1 whitespace-nowrap">{af}</span>}
                                      </div>
                                    </td>
                                    <td className="px-6 md:px-10 py-6 align-top min-w-[200px] md:min-w-[280px]">
                                      <div className="font-bold text-slate-800 text-sm md:text-base whitespace-normal leading-snug">{equipName}</div>
                                    </td>
                                    <td className="px-6 md:px-10 py-6 align-top">
                                      {editingLocationId === item.id ? (
                                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2">
                                          <input
                                            list="inventory-locations-list"
                                            value={newLocationValue}
                                            onChange={(e) => setNewLocationValue(e.target.value)}
                                            className="p-2 border border-red-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-red-500 w-full min-w-[150px] shadow-sm"
                                            autoFocus
                                          />
                                          <div className="flex gap-2">
                                            <button 
                                              onClick={() => handleSaveLocation(item)}
                                              disabled={isUpdatingLocation}
                                              className="bg-green-500 text-white p-2 rounded hover:bg-green-600 disabled:opacity-50 transition-colors"
                                              title="Salvar"
                                            >
                                              {isUpdatingLocation ? <RefreshCw size={16} className="animate-spin" /> : <ClipboardCheck size={16} />}
                                            </button>
                                            <button 
                                              onClick={() => setEditingLocationId(null)}
                                              disabled={isUpdatingLocation}
                                              className="bg-gray-200 text-gray-700 p-2 rounded hover:bg-gray-300 disabled:opacity-50 transition-colors"
                                              title="Cancelar"
                                            >
                                              <X size={16} />
                                            </button>
                                          </div>
                                        </div>
                                      ) : (
                                        <div className="flex items-center justify-between gap-3 font-semibold italic w-fit px-3 md:px-4 py-2 rounded-xl border bg-slate-50 text-slate-600 border-slate-100 group/loc transition-all hover:border-red-200 hover:bg-red-50/30">
                                          <div className="flex items-center gap-2 md:gap-3">
                                            <MapPin size={16} className="text-red-500 shrink-0" />
                                            <span className="whitespace-normal leading-snug text-xs md:text-sm">{item["equipment location"]}</span>
                                          </div>
                                          <button 
                                            onClick={() => { setEditingLocationId(item.id); setNewLocationValue(item["equipment location"]); }}
                                            className="text-gray-400 hover:text-red-600 opacity-100 lg:opacity-0 lg:group-hover/loc:opacity-100 transition-opacity p-1"
                                            title="Editar Localização"
                                          >
                                            <Edit size={16} />
                                          </button>
                                        </div>
                                      )}
                                    </td>
                                  </tr>
                                );
                              }) : <tr><td colSpan="3" className="px-10 py-20 text-center text-slate-400 font-medium italic">Nenhum resultado encontrado.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* --- ABA 4: PROCEDIMENTOS (NOVA COM GOOGLE DRIVE) --- */}
                {activeTab === 'procedures' && !reportMode && !dispatchReportMode && (
                  <div className="animate-in fade-in duration-300">
                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 md:p-8">
                      
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-slate-100 pb-6 gap-4">
                        <div>
                            <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">Procedimentos e Manuais</h3>
                            <p className="text-slate-500 text-sm mt-1">Gerencie os manuais técnicos na nuvem do Google Drive</p>
                        </div>
                        <div className="w-full sm:w-auto">
                            <input 
                                type="file" 
                                accept="application/pdf" 
                                id="pdf-upload" 
                                className="hidden" 
                                onChange={handleFileUpload}
                                disabled={isUploadingPdf}
                            />
                            <label htmlFor="pdf-upload" className={`cursor-pointer flex justify-center items-center gap-2 bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition-colors w-full sm:w-auto ${isUploadingPdf ? 'opacity-50 pointer-events-none' : ''}`}>
                                {isUploadingPdf ? <Loader size={20} className="animate-spin" /> : <UploadIcon size={20} />} 
                                {isUploadingPdf ? 'Enviando...' : 'Adicionar PDF'}
                            </label>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                          {isLoadingPdfs ? (
                              <div className="col-span-full p-10 text-center text-slate-400 font-medium italic flex flex-col items-center justify-center gap-3">
                                  <Loader size={32} className="animate-spin text-red-500" />
                                  Carregando PDFs do Drive...
                              </div>
                          ) : pdfs.length === 0 ? (
                              <div className="col-span-full p-10 text-center text-slate-400 font-medium italic border-2 border-dashed border-slate-200 rounded-3xl">
                                  Nenhum procedimento guardado na pasta. Faça o upload de um ficheiro PDF.
                              </div>
                          ) : (
                              pdfs.map(pdf => (
                                  <div key={pdf.id} className="bg-slate-50 border border-slate-200 p-5 rounded-2xl flex flex-col justify-between group hover:border-red-300 transition-colors shadow-sm">
                                      <div className="flex items-start gap-4 mb-4">
                                          <div className="bg-red-100 text-red-600 p-3 rounded-xl shrink-0">
                                              <FileText size={28} />
                                          </div>
                                          <div className="flex-1 overflow-hidden">
                                              <h4 className="font-bold text-slate-800 truncate" title={pdf.name}>{pdf.name}</h4>
                                              <p className="text-xs text-slate-500 font-semibold mt-1">Adicionado a: {pdf.date}</p>
                                          </div>
                                      </div>
                                      <div className="flex items-center gap-2 mt-auto pt-4 border-t border-slate-200">
                                          <button onClick={() => handleViewPdf(pdf)} className="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-100 transition-colors">
                                              <Eye size={16} /> Ler
                                          </button>
                                          <button onClick={() => handleDownloadPdf(pdf)} className="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-300 text-slate-700 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-100 transition-colors">
                                              <Download size={16} /> Baixar
                                          </button>
                                          <button onClick={() => handleDeletePdf(pdf.id)} className="bg-white border border-red-200 text-red-500 px-3 py-2 rounded-lg hover:bg-red-50 transition-colors" title="Apagar">
                                              <Trash2 size={16} />
                                          </button>
                                      </div>
                                  </div>
                              ))
                          )}
                      </div>
                    </div>
                  </div>
                )}

                {/* --- ABA 2: CHECKLIST DE SEPARAÇÃO --- */}
                {activeTab === 'dispatch' && !dispatchReportMode && (
                  <div className="animate-in fade-in duration-300 max-w-5xl mx-auto pb-20">
                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 md:p-8">
                      
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 border-b border-slate-100 pb-8">
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Data</label>
                          <input type="date" className="w-full border-none bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-red-500" value={dispatchData.date} onChange={(e) => setDispatchData({...dispatchData, date: e.target.value})}/>
                        </div>
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Responsável</label>
                          <input type="text" placeholder="Nome do técnico..." className="w-full border-none bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-red-500" value={dispatchData.responsible} onChange={(e) => setDispatchData({...dispatchData, responsible: e.target.value})}/>
                        </div>
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Destino / Projeto</label>
                          <input type="text" placeholder="Cliente / Local..." className="w-full border-none bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-red-500" value={dispatchData.destination} onChange={(e) => setDispatchData({...dispatchData, destination: e.target.value})}/>
                        </div>
                      </div>

                      <div className="mb-8 bg-red-50 p-5 rounded-2xl border border-red-100">
                        <div className="flex flex-col md:flex-row gap-6">
                          <div className="flex-1">
                            <label className="block text-xs font-black text-red-800 uppercase tracking-widest mb-2">Categoria do Checklist</label>
                            <select 
                              className="w-full bg-white border border-red-200 rounded-xl p-3 text-sm md:text-base font-black uppercase tracking-wide focus:ring-2 focus:ring-red-500"
                              value={dispatchData.type}
                              onChange={(e) => setDispatchData({...dispatchData, type: e.target.value})}
                            >
                              {Object.keys(CHECKLIST_TEMPLATES).map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                          </div>
                          
                          {dispatchData.type === 'Temperatura e Pressão' && (
                            <div className="flex-1">
                              <label className="text-xs font-black text-red-800 uppercase tracking-widest mb-2 flex items-center gap-2">
                                Carregar Kit <span className="bg-red-600 text-white px-2 py-0.5 rounded text-[10px]">Automático</span>
                              </label>
                              <select 
                                className="w-full bg-white border border-red-200 rounded-xl p-3 text-sm font-bold text-slate-700 focus:ring-2 focus:ring-red-500"
                                value={dispatchData.selectedKit || ''}
                                onChange={handleKitSelection}
                              >
                                <option value="">-- Preenchimento Manual --</option>
                                {Object.keys(KITS_FPSO).map(kit => (
                                  <option key={kit} value={kit}>{kit}</option>
                                ))}
                              </select>
                            </div>
                          )}
                        </div>
                      </div>

                      <div className="overflow-x-auto custom-scrollbar border border-slate-200 rounded-xl mb-8 shadow-sm">
                        <table className="w-full text-left text-sm table-auto min-w-[700px]">
                          <thead>
                            <tr className="bg-slate-100">
                              <th className="p-4 font-black text-slate-600 uppercase tracking-wider text-xs">Equipamento</th>
                              <th className="p-4 font-black text-slate-600 uppercase tracking-wider text-xs">Acessórios Necessários</th>
                              <th className="p-4 font-black text-slate-600 uppercase tracking-wider text-xs w-64 text-center">Vincular Código (Inventário)</th>
                              <th className="p-4 font-black text-slate-600 uppercase tracking-wider text-xs w-48">Observação</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {renderDispatchRows()}
                          </tbody>
                        </table>
                      </div>

                      <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                        <h3 className="font-black text-slate-700 uppercase tracking-widest text-xs mb-4">Itens Gerais de Verificação</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                          {Object.entries({
                            limpos: 'Equipamentos limpos',
                            carregadores: 'Carregadores carregando',
                            cabos: 'Cabos sem danos',
                            certificado: 'Certificado de calibração válido',
                            maleta: 'Maleta / Case'
                          }).map(([key, label]) => (
                            <label key={key} className="flex items-center gap-3 cursor-pointer group bg-white p-3 rounded-xl border border-slate-200 hover:border-red-300 transition-colors shadow-sm">
                              <input 
                                type="checkbox" 
                                className="rounded w-5 h-5 text-red-600 focus:ring-red-500 border-slate-300"
                                checked={dispatchData.checks[key]}
                                onChange={(e) => handleDispatchCheckChange(key, e.target.checked)}
                              />
                              <span className="text-sm font-semibold text-slate-700 group-hover:text-slate-900">{label}</span>
                            </label>
                          ))}
                        </div>
                      </div>

                      <button 
                        onClick={handlePrintDispatch}
                        className="w-full bg-red-600 text-white py-4 md:py-5 rounded-2xl font-black text-sm md:text-base uppercase tracking-widest hover:bg-red-700 transition-colors flex justify-center items-center gap-3 shadow-lg shadow-red-600/30"
                      >
                        Imprimir e Transferir para IN/OUT <Printer size={20} />
                      </button>

                    </div>
                  </div>
                )}

                {/* --- IMPRESSÃO CHECKLIST DE SEPARAÇÃO --- */}
                {dispatchReportMode && activeTab === 'dispatch' && (
                  <div className="max-w-4xl mx-auto bg-white rounded-none md:rounded-[2rem] shadow-none md:shadow-xl border-0 md:border border-slate-200 p-8 md:p-12 print:p-0 print:shadow-none print:border-0 print:max-w-none print-area">
                    
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-8 border-b border-dashed border-slate-200 print:hidden">
                      <button onClick={() => setDispatchReportMode(false)} className="flex items-center gap-2 text-slate-500 hover:text-slate-900 font-bold transition-colors w-full md:w-auto justify-center">
                        <ArrowLeft size={20} /> Voltar ao Formulário
                      </button>
                      <button onClick={printReport} className="flex items-center justify-center gap-2 bg-red-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition-colors w-full md:w-auto">
                        <Printer size={20} /> Imprimir / PDF
                      </button>
                    </div>

                    <div className="flex justify-between items-center mb-8 border-b-2 border-slate-800 pb-4">
                      <img 
                        src="dog%20ods.png" 
                        alt="ODS Metering Systems Logo" 
                        className="h-12 w-auto" 
                        onError={(e) => { e.target.style.display = 'none'; }}
                      />
                      <div className="text-right">
                        <h1 className="text-xl font-black uppercase">Checklist - Equipment Dispatch Verification</h1>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6 border border-slate-800 p-4 font-semibold text-sm">
                      <div><span className="font-bold">Data:</span> {dispatchData.date}</div>
                      <div><span className="font-bold">Responsável:</span> {dispatchData.responsible}</div>
                      <div className="col-span-2"><span className="font-bold">Destino/Projeto:</span> {dispatchData.destination}</div>
                    </div>

                    <div className="mb-8">
                      <h2 className="bg-slate-800 text-white p-2 font-bold uppercase tracking-widest text-center text-sm">
                        {dispatchData.type} {dispatchData.selectedKit ? `- ${dispatchData.selectedKit}` : ''}
                      </h2>
                      <table className="w-full text-left text-xs border-collapse border border-slate-800">
                        <thead>
                          <tr className="bg-slate-100">
                            <th className="border border-slate-800 p-2 uppercase w-1/3">Equipamento</th>
                            <th className="border border-slate-800 p-2 uppercase w-1/4">Acessórios</th>
                            <th className="border border-slate-800 p-2 uppercase text-center w-1/4">Código do Equipamento</th>
                            <th className="border border-slate-800 p-2 uppercase">Observação</th>
                          </tr>
                        </thead>
                        <tbody>
                          {CHECKLIST_TEMPLATES[dispatchData.type].map((item, idx) => {
                            const itemData = dispatchData.items[item.name] || {};
                            const isMulti = item.name.includes("Kit de Manômetros") || item.name.includes("Bore Gauge") || item.name.includes("Dry Block");
                            
                            return (
                              <tr key={idx}>
                                <td className="border border-slate-800 p-2 font-bold">{item.name}</td>
                                <td className="border border-slate-800 p-2 italic text-slate-600">{item.accessories}</td>
                                <td className="border border-slate-800 p-2 font-bold text-center">
                                  {isMulti ? (itemData.codes ? itemData.codes.join(" | ") : '') : (itemData.code || '')}
                                </td>
                                <td className="border border-slate-800 p-2">{itemData.obs || ''}</td>
                              </tr>
                            )
                          })}
                        </tbody>
                      </table>
                    </div>

                    <div>
                      <h3 className="bg-slate-200 text-slate-800 p-2 font-bold uppercase tracking-widest text-sm border border-b-0 border-slate-800">Itens</h3>
                      <table className="w-full text-left text-xs border-collapse border border-slate-800">
                        <thead>
                          <tr className="bg-slate-100">
                            <th className="border border-slate-800 p-2 uppercase">Equipamentos</th>
                            <th className="border border-slate-800 p-2 uppercase text-center w-32">Status</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr><td className="border border-slate-800 p-2 font-semibold">Equipamentos limpos</td><td className="border border-slate-800 p-2 text-center font-bold">{dispatchData.checks.limpos ? 'OK' : ''}</td></tr>
                          <tr><td className="border border-slate-800 p-2 font-semibold">Carregadores carregando</td><td className="border border-slate-800 p-2 text-center font-bold">{dispatchData.checks.carregadores ? 'OK' : ''}</td></tr>
                          <tr><td className="border border-slate-800 p-2 font-semibold">Cabos sem danos</td><td className="border border-slate-800 p-2 text-center font-bold">{dispatchData.checks.cabos ? 'OK' : ''}</td></tr>
                          <tr><td className="border border-slate-800 p-2 font-semibold">Certificado de calibração válido</td><td className="border border-slate-800 p-2 text-center font-bold">{dispatchData.checks.certificado ? 'OK' : ''}</td></tr>
                          <tr><td className="border border-slate-800 p-2 font-semibold">Maleta / Case</td><td className="border border-slate-800 p-2 text-center font-bold">{dispatchData.checks.maleta ? 'OK' : ''}</td></tr>
                        </tbody>
                      </table>
                    </div>

                  </div>
                )}

                {/* --- ABA 3: RELATÓRIO IN/OUT --- */}
                {activeTab === 'checklist' && !reportMode && (
                  <div className="animate-in fade-in duration-300 max-w-4xl mx-auto pb-20">
                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6 md:p-8">
                      
                      <div className="flex flex-col sm:flex-row items-center justify-between border-b border-slate-100 pb-6 mb-6 gap-4">
                        <div className="flex w-full sm:w-auto bg-slate-100 p-1 rounded-xl">
                          <button onClick={() => handleTypeChange('OUT')} className={`flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-black uppercase tracking-wider transition-all ${checklistData.type === 'OUT' ? 'bg-white shadow-sm text-red-600' : 'text-slate-400 hover:text-slate-600'}`}>Saída</button>
                          <button onClick={() => handleTypeChange('IN')} className={`flex-1 sm:flex-none px-6 py-2.5 rounded-lg text-sm font-black uppercase tracking-wider transition-all ${checklistData.type === 'IN' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-400 hover:text-slate-600'}`}>Entrada</button>
                        </div>
                        <div className="text-left sm:text-right w-full sm:w-auto">
                          <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Data</p>
                          <input type="date" className="w-full sm:w-auto border-none bg-slate-50 rounded-lg px-3 py-2 text-sm font-bold mt-1" value={checklistData.date} onChange={(e) => handleInOutChange('date', e.target.value)}/>
                        </div>
                      </div>

                      {/* Informações Básicas */}
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Origem / Destino</label>
                          <div className="flex flex-col sm:flex-row items-center gap-3 bg-slate-50 p-3 rounded-xl relative">
                            <input 
                              list="locations-list"
                              type="text" 
                              placeholder="De..." 
                              className="w-full bg-transparent border sm:border-none border-slate-200 rounded sm:rounded-none p-2 sm:p-0 text-sm font-semibold focus:ring-0" 
                              value={checklistData.from} 
                              onChange={(e) => handleInOutChange('from', e.target.value)} 
                            />
                            <ArrowRight size={16} className="text-slate-400 shrink-0 hidden sm:block" />
                            <ArrowDown size={16} className="text-slate-400 shrink-0 block sm:hidden" />
                            <input 
                              list="locations-list"
                              type="text" 
                              placeholder="Para..." 
                              className="w-full bg-transparent border sm:border-none border-slate-200 rounded sm:rounded-none p-2 sm:p-0 text-sm font-semibold focus:ring-0" 
                              value={checklistData.to} 
                              onChange={(e) => handleInOutChange('to', e.target.value)} 
                            />
                            
                            <datalist id="locations-list">
                              {uniqueLocations.filter(loc => loc !== 'Todas').map((loc, idx) => (
                                <option key={idx} value={loc} />
                              ))}
                            </datalist>
                          </div>
                        </div>
                        <div>
                          <label className="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2">Finalidade</label>
                          <select className="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-semibold focus:ring-2 focus:ring-red-500" value={checklistData.objective} onChange={(e) => handleInOutChange('objective', e.target.value)}>
                            <option>Serviços de calibração</option>
                            <option>Calibração do padrão</option>
                            <option>Manutenção</option>
                            <option>Outros</option>
                          </select>
                        </div>
                      </div>

                      {/* Seleção de Múltiplos Equipamentos */}
                      <div className="mb-8 bg-red-50 p-4 md:p-6 rounded-2xl border border-red-100">
                        <label className="block text-xs font-black text-red-800 uppercase tracking-widest mb-3">Vincular Equipamentos do Inventário</label>
                        
                        <div className="relative mb-3">
                          <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-red-400" size={18} />
                          <input 
                            type="text" 
                            placeholder="Pesquisar equipamento (Ex: AF 0285, Caliper...)" 
                            className="w-full pl-12 pr-4 py-3 bg-white border-none rounded-xl text-sm font-medium focus:ring-2 focus:ring-red-500 shadow-sm"
                            value={equipmentSearchTerm}
                            onChange={(e) => setEquipmentSearchTerm(e.target.value)}
                          />
                        </div>

                        <select 
                          className="w-full bg-white border-none rounded-xl p-4 text-sm font-bold shadow-sm focus:ring-2 focus:ring-red-500 mb-4"
                          onChange={handleAddEquipment}
                          value=""
                        >
                          <option value="" disabled>-- Selecione um equipamento para adicionar --</option>
                          {availableEquipmentsForChecklist.map(item => {
                            const equipName = item["equipment_2"] || item["equipment"];
                            const af = item["af"] || item["número af"] || item["af dimensional"];
                            const code = item["ods code"] || item["af dimensional"] || "S/ CODIGO";
                            return (
                              <option key={item.id} value={item.id}>
                                {code} {af && af !== code ? `(${af})` : ''} - {equipName}
                              </option>
                            );
                          })}
                        </select>

                        {checklistData.selectedEquipments.length > 0 && (
                          <div className="space-y-3 mt-4">
                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Equipamentos no Relatório ({checklistData.selectedEquipments.length}):</p>
                            {checklistData.selectedEquipments.map((eq, index) => {
                              const equipName = eq["equipment_2"] || eq["equipment"];
                              const af = eq["af"] || eq["número af"] || eq["af dimensional"];
                              const code = eq["ods code"] || eq["af dimensional"] || "S/ CODIGO";
                              
                              return (
                                <div key={eq.id} className="flex flex-col md:flex-row justify-between gap-4 text-sm bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                                  <div className="flex-1">
                                    <div className="flex items-center justify-between mb-2 pb-2 border-b border-slate-50">
                                      <span className="font-bold text-slate-800">
                                        <span className="bg-slate-800 text-white px-2 py-0.5 rounded text-[10px] mr-2">{index + 1}</span>
                                        {code} {af && af !== code ? `(${af})` : ''} - {equipName}
                                      </span>
                                      <button onClick={() => handleRemoveEquipment(eq.id)} className="text-orange-500 hover:text-orange-700 hover:bg-orange-50 p-1.5 rounded-lg transition-colors">
                                        <Trash2 size={16} />
                                      </button>
                                    </div>
                                    <div className="flex flex-col md:flex-row gap-4 mt-2">
                                      <div className="flex-1">
                                        <span className="text-slate-400 font-bold block text-[10px] uppercase">Acessórios Esperados:</span>
                                        <span className="font-semibold text-slate-700 text-xs">{getExpectedAccessories(equipName)}</span>
                                      </div>
                                      <div className="flex-1">
                                        <span className="text-slate-400 font-bold block text-[10px] uppercase">Local Atual:</span>
                                        <span className="font-semibold text-slate-700 text-xs">{eq["equipment location"]}</span>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                        )}
                      </div>

                      {/* Condições do Equipamento */}
                      <div className="mb-8">
                        <h3 className="text-lg font-black text-slate-800 mb-4 border-b border-slate-100 pb-2">Verificação de Condições (Aplica-se a todos)</h3>
                        <div className="space-y-4">
                          <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-slate-50 p-4 rounded-xl gap-3">
                            <div className="mb-2 md:mb-0"><p className="font-bold text-sm">Identificação e Integridade</p><p className="text-xs text-slate-500">Sem danos aparentes aos equipamentos e caixas.</p></div>
                            <div className="flex gap-2 w-full md:w-auto">
                              <button onClick={() => handleInOutChange('integrity', 'OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.integrity === 'OK' ? 'bg-orange-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>OK</button>
                              <button onClick={() => handleInOutChange('integrity', 'NOT OK')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${checklistData.integrity === 'NOT OK' ? 'bg-red-500 text-white' : 'bg-white border border-slate-200 text-slate-500'}`}>NOT OK</button>
                            </div>
                          </div>

                          <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-slate-50 p-4 rounded-xl gap-3">
                            <div className="mb-2 md:mb-0"><p className="font-bold text-sm">Acessórios</p><p className="text-xs text-slate-500">Todos os acessórios previstos estão presentes, sem danos.</p></div>
                            <div className="flex gap-2 w-full md:w-auto">
