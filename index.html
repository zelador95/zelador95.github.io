                                        <input type="date" value={outDate} onChange={(e) => {
                                            setOutDate(e.target.value);
                                            if(!returnDate || e.target.value > returnDate) setReturnDate(e.target.value);
                                        }} className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-600 mb-1">Data de Retorno</label>
                                        <input type="date" value={returnDate} onChange={(e) => setReturnDate(e.target.value)} min={outDate} className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm"/>
                                    </div>
                                    
                                    {/* MÚLTIPLA SELEÇÃO DE SERVIÇOS */}
                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-medium text-gray-600 mb-1">Tipos de Serviço (Selecione um ou mais)</label>
                                        <select 
                                            value="" 
                                            onChange={(e) => {
                                                const val = e.target.value;
                                                if(val && !selectedServices.includes(val)) setSelectedServices([...selectedServices, val]);
                                            }} 
                                            className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm mb-2"
                                        >
                                            <option value="">Adicionar tipo de serviço...</option>
                                            {serviceTypes.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                        {selectedServices.length > 0 && (
                                            <div className="flex flex-wrap gap-2 mt-1">
                                                {selectedServices.map(s => (
                                                    <span key={s} className="bg-red-50 text-red-800 border border-red-200 text-[11px] font-semibold px-2.5 py-1 rounded flex items-center gap-1">
                                                        {s}
                                                        <button type="button" onClick={() => setSelectedServices(selectedServices.filter(item => item !== s))} className="text-red-500 hover:text-red-900 font-bold ml-1 transition-colors">&times;</button>
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="md:col-span-2">
                                        <label className="block text-xs font-medium text-gray-600 mb-1">Local / Cliente</label>
                                        <select value={location} onChange={(e) => setLocation(e.target.value)} className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm">
                                            <option value="">Selecione a Localidade...</option>
                                            {locations.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* CHECKLIST */}
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="text-sm font-bold text-gray-700 uppercase tracking-wide mb-3">2. Checklist de Verificação</h3>
                                <div className="flex gap-2 mb-4">
                                    <input type="text" value={newTask} onChange={(e) => setNewTask(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addTask()} placeholder="Adicionar nova tarefa..." className="flex-1 p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm"/>
                                    <button onClick={addTask} className="bg-gray-800 hover:bg-gray-900 text-white px-3 rounded-md transition-colors"><PlusIcon /></button>
                                </div>
                                <div className="space-y-2">
                                    {tasks.map(t => (
                                        <div key={t.id} className="flex justify-between items-center bg-white p-2.5 rounded border border-gray-200 shadow-sm">
                                            <span className="text-sm font-medium text-gray-700 flex-1 truncate pr-2">{t.text}</span>
                                            <div className="flex gap-1">
                                                <button onClick={() => updateTaskStatus(t.id, 'OK')} className={`px-2 py-1 text-[10px] font-bold rounded ${t.status === 'OK' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>OK</button>
                                                <button onClick={() => updateTaskStatus(t.id, 'NOK')} className={`px-2 py-1 text-[10px] font-bold rounded ${t.status === 'NOK' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>NOK</button>
                                                <button onClick={() => updateTaskStatus(t.id, 'N/A')} className={`px-2 py-1 text-[10px] font-bold rounded ${t.status === 'N/A' ? 'bg-gray-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>N/A</button>
                                                <button onClick={() => removeTask(t.id)} className="ml-2 text-red-400 hover:text-red-600"><TrashIcon /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* IN / OUT */}
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <div className="flex flex-col mb-3">
                                    <h3 className="text-sm font-bold text-gray-700 uppercase tracking-wide">3. Controle In / Out</h3>
                                    {selectedServices.length > 0 && (
                                        <p className="text-[11px] font-semibold text-red-600 mt-1 flex items-center gap-1">
                                            Vincular a: <span className="text-gray-700 bg-red-100 px-2 py-0.5 rounded ml-1">{selectedServices.join(' | ')}</span>
                                        </p>
                                    )}
                                </div>
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-500 inline-block"></span> IN (Entrada / Retirada)</label>
                                        <textarea value={equipmentIn} onChange={(e) => setEquipmentIn(e.target.value)} rows="2" placeholder="Ex: Multímetro, Sensor X, Kit Ferramentas B..." className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm bg-white"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-orange-500 inline-block"></span> OUT (Saída / Devolução)</label>
                                        <textarea value={equipmentOut} onChange={(e) => setEquipmentOut(e.target.value)} rows="2" placeholder="Ex: Peça danificada, Kit devolvido completo..." className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm bg-white"></textarea>
                                    </div>
                                </div>
                            </div>

                            {/* OBSERVAÇÕES */}
                            <div>
                                <label className="block text-xs font-bold text-gray-600 mb-1">Observações Adicionais</label>
                                <textarea value={observations} onChange={(e) => setObservations(e.target.value)} rows="2" className="w-full p-2 border border-gray-300 rounded-md focus:border-red-500 outline-none text-sm bg-gray-50"></textarea>
                            </div>
                            
                            <button onClick={generateReportPDF} className="w-full ods-red-bg ods-red-bg-hover text-white font-bold py-3 px-6 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2 mt-4">
                                <DownloadIcon /> Gerar Relatório PDF
                            </button>
                        </div>
                    </div>

                    {/* PRÉ-VISUALIZAÇÃO DO DOCUMENTO (DOCUMENTO A4) */}
                    <div className="w-full lg:w-1/2 flex justify-center bg-gray-200 p-4 rounded-xl overflow-y-auto max-h-[80vh] custom-scrollbar shadow-inner">
                        {/* A4 Wrapper (210 x 297 proporção) */}
                        <div id="in-out-print-area" className="bg-white shadow-lg w-full max-w-[700px] h-fit p-8 text-black text-sm border border-gray-300 relative">
                            {/* Document Header */}
                            <div className="flex justify-between items-center border-b-2 ods-red-border pb-4 mb-6">
                                {!logoError ? (
                                    <img src="https://ods-metering.com/wp-content/uploads/2024/09/ODS-METERING-SYSTEMS-LOGO-V2.png" alt="ODS Logo" className="h-10" />
                                ) : (
                                    <div className="flex items-center">
                                        <span className="text-red-600 font-black text-2xl italic tracking-tighter">ODS</span>
                                        <span className="text-gray-800 font-bold text-[10px] leading-tight ml-1.5 border-l border-gray-400 pl-1.5">METERING<br/>SYSTEMS</span>
                                    </div>
                                )}
                                <div className="text-right">
                                    <h1 className="text-lg font-black text-gray-800 uppercase tracking-wide">Relatório de Serviço</h1>
                                    <p className="text-xs text-red-600 font-bold uppercase tracking-wider">Checklist & In/Out</p>
                                </div>
                            </div>

                            {/* Section 1: Info */}
                            <div className="mb-6 grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded border border-gray-200">
                                <div className="col-span-2"><span className="font-bold text-gray-600 text-xs uppercase block mb-0.5">Técnico / Colaborador</span><span className="font-medium text-base">{selectedEmp.name || 'Não selecionado'}</span> {selectedEmp.category && <span className="text-xs ml-1 bg-gray-200 px-1 rounded">{selectedEmp.category}</span>}</div>
                                <div><span className="font-bold text-gray-600 text-xs uppercase block mb-0.5">Data Saída</span><span className="font-medium text-sm">{formatDateBR(outDate)}</span></div>
                                <div><span className="font-bold text-gray-600 text-xs uppercase block mb-0.5">Data Retorno</span><span className="font-medium text-sm">{returnDate ? formatDateBR(returnDate) : '-'}</span></div>
                                <div className="col-span-2"><span className="font-bold text-gray-600 text-xs uppercase block mb-0.5">Localidade / Cliente</span><span className="font-medium text-sm">{location || 'Não informado'}</span></div>
                            </div>

                            {/* Section 2: In / Out */}
                            <div className="mb-6">
                                <h3 className="font-bold text-gray-800 text-sm uppercase border-b border-gray-300 pb-1 mb-3 flex flex-col sm:flex-row justify-between sm:items-end gap-1">
                                    <span>Controle de Materiais (IN / OUT)</span>
                                    {selectedServices.length > 0 && <span className="text-[10px] font-semibold text-red-600">Serviço(s): {selectedServices.join(', ')}</span>}
                                </h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="border border-blue-200 rounded overflow-hidden">
                                        <div className="bg-blue-100 text-blue-800 font-bold text-xs uppercase p-2 border-b border-blue-200 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-blue-600 inline-block"></span> IN (Entrada / Retirada)
                                        </div>
                                        <div className="p-3 text-gray-700 min-h-[4rem] whitespace-pre-wrap">{equipmentIn || '- Nenhum item reportado -'}</div>
                                    </div>
                                    <div className="border border-orange-200 rounded overflow-hidden">
                                        <div className="bg-orange-100 text-orange-800 font-bold text-xs uppercase p-2 border-b border-orange-200 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-orange-600 inline-block"></span> OUT (Saída / Devolução)
                                        </div>
                                        <div className="p-3 text-gray-700 min-h-[4rem] whitespace-pre-wrap">{equipmentOut || '- Nenhum item reportado -'}</div>
                                    </div>
                                </div>
                            </div>

                            {/* Section 3: Checklist */}
                            <div className="mb-6">
                                <h3 className="font-bold text-gray-800 text-sm uppercase border-b border-gray-300 pb-1 mb-3">Checklist de Verificação Operacional</h3>
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-600 text-[10px] uppercase">
                                            <th className="p-2 border border-gray-200 w-[65%]">Item Verificado / Tarefa</th>
                                            <th className="p-2 border border-gray-200 text-center w-[35%]">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {tasks.length > 0 ? tasks.map(t => (
                                            <tr key={t.id}>
                                                <td className="p-2 border border-gray-200 text-xs font-medium text-gray-700">{t.text}</td>
                                                <td className="p-2 border border-gray-200 text-center">
                                                    {t.status === 'OK' && <span className="text-green-600 font-bold text-xs">✓ OK</span>}
                                                    {t.status === 'NOK' && <span className="text-red-600 font-bold text-xs">✗ NOK</span>}
                                                    {t.status === 'N/A' && <span className="text-gray-500 font-bold text-xs">- N/A -</span>}
                                                    {t.status === 'Pendente' && <span className="text-gray-400 font-medium text-xs border border-dashed border-gray-300 px-2 rounded">Pendente</span>}
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="2" className="p-4 text-center text-gray-400 text-xs italic">Nenhum item na lista de verificação.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {/* Section 4: Obs */}
                            <div className="mb-10">
                                <h3 className="font-bold text-gray-800 text-sm uppercase border-b border-gray-300 pb-1 mb-2">Observações</h3>
                                <div className="p-3 bg-gray-50 border border-gray-200 rounded min-h-[3rem] text-xs text-gray-700 whitespace-pre-wrap">
                                    {observations || '- Nenhuma observação adicional -'}
                                </div>
                            </div>

                            {/* Signatures */}
                            <div className="grid grid-cols-2 gap-8 mt-12 pt-8 border-t border-dashed border-gray-300">
                                <div className="text-center">
                                    <div className="border-b border-gray-800 w-3/4 mx-auto mb-2"></div>
                                    <p className="text-xs font-bold text-gray-800 uppercase">{selectedEmp.name || 'Assinatura do Técnico'}</p>
                                    <p className="text-[10px] text-gray-500">ODS Metering Systems</p>
                                </div>
                                <div className="text-center">
                                    <div className="border-b border-gray-800 w-3/4 mx-auto mb-2"></div>
                                    <p className="text-xs font-bold text-gray-800 uppercase">Assinatura Cliente / Responsável</p>
                                    <p className="text-[10px] text-gray-500">{location || 'Local'}</p>
                                </div>
                            </div>
                            
                            {/* Footer */}
                            <div className="absolute bottom-4 left-0 w-full text-center text-[9px] text-gray-400">
                                Documento gerado pelo Sistema Operacional ODS Metering em {new Date().toLocaleDateString('pt-BR')} às {new Date().toLocaleTimeString('pt-BR')}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ConfigView = ({ serviceTypes, locations, dayOffReasons, updateSettings, showMessage }) => {
            const [newService, setNewService] = useState('');
            const [newLocation, setNewLocation] = useState('');
            const [newReason, setNewReason] = useState('');

            const handleAdd = (type) => {
                if (type === 'service' && newService.trim()) {
                    if(serviceTypes.includes(newService.trim())) return showMessage('error', 'Item já existe!');
                    updateSettings('serviceTypes', [...serviceTypes, newService.trim()]);
                    setNewService('');
                    showMessage('success', 'Tipo de serviço adicionado!');
                } else if (type === 'location' && newLocation.trim()) {
                    if(locations.includes(newLocation.trim())) return showMessage('error', 'Item já existe!');
                    updateSettings('locations', [...locations, newLocation.trim()]);
                    setNewLocation('');
                    showMessage('success', 'Local adicionado!');
                } else if (type === 'reason' && newReason.trim()) {
                    if(dayOffReasons.includes(newReason.trim())) return showMessage('error', 'Item já existe!');
                    updateSettings('dayOffReasons', [...dayOffReasons, newReason.trim()]);
                    setNewReason('');
                    showMessage('success', 'Tipo de folga adicionado!');
                }
            };

            const handleRemove = (type, item) => {
                if (type === 'service') {
                    updateSettings('serviceTypes', serviceTypes.filter(i => i !== item));
                } else if (type === 'location') {
                    updateSettings('locations', locations.filter(i => i !== item));
                } else if (type === 'reason') {
                    updateSettings('dayOffReasons', dayOffReasons.filter(i => i !== item));
                }
                showMessage('success', 'Item removido!');
            };

            const renderList = (title, items, type, value, setValue) => (
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full min-h-[300px]">
                    <h3 className="font-bold text-gray-800 mb-4">{title}</h3>
                    
                    <div className="flex gap-2 mb-4">
                        <input 
                            type="text" 
                            value={value} 
                            onChange={(e) => setValue(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && handleAdd(type)}
                            placeholder="Adicionar novo..."
                            className="flex-1 p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-sm"
                        />
                        <button onClick={() => handleAdd(type)} className="ods-red-bg ods-red-bg-hover text-white p-2 rounded-lg transition-colors flex items-center justify-center min-w-[40px]">
                            <PlusIcon />
                        </button>
                    </div>

                    <ul className="flex-1 overflow-y-auto pr-2 space-y-2 hide-scrollbar">
                        {items.map((item, idx) => (
                            <li key={idx} className="flex justify-between items-center bg-gray-50 p-2.5 rounded-lg text-sm border border-gray-100">
                                <span className="text-gray-700 truncate mr-2" title={item}>{item}</span>
                                <button onClick={() => handleRemove(type, item)} className="text-red-500 hover:text-red-700 p-1 rounded hover:bg-red-50 transition-colors flex-shrink-0">
                                    <TrashIcon />
                                </button>
                            </li>
                        ))}
                        {items.length === 0 && <li className="text-sm text-gray-500 text-center py-2">Nenhum item cadastrado</li>}
                    </ul>
                </div>
            );

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto">
                    {renderList('Tipos de Serviço', serviceTypes, 'service', newService, setNewService)}
                    {renderList('Locais do Serviço', locations, 'location', newLocation, setNewLocation)}
                    {renderList('Tipos de Folga', dayOffReasons, 'reason', newReason, setNewReason)}
                </div>
            );
        };

        const App = () => {
            const [isLoadingData, setIsLoadingData] = useState(true);

            // UI States
            const [activeTab, setActiveTab] = useState('agenda'); 
            const [message, setMessage] = useState(null); 
            const [currentDate, setCurrentDate] = useState(new Date(2026, 3, 1)); 
            const [selectedItem, setSelectedItem] = useState(null);
            const [logoError, setLogoError] = useState(false);

            // Data States 
            const [employees] = useState(employeesList);
            const [activities, setActivities] = useState([]);
            const [daysOff, setDaysOff] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [serviceTypes, setServiceTypes] = useState([]);
            const [locations, setLocations] = useState([]);
            const [dayOffReasons, setDayOffReasons] = useState([
                "Férias", "Compensação de Banco de Horas", "Licença Médica", "Outros"
            ]);

            const showMessage = (type, text) => {
                setMessage({ type, text });
                setTimeout(() => setMessage(null), 4000);
            };

            // Inicia o banco de dados local e puxa as informações
            useEffect(() => {
                const loadData = async () => {
                    try {
                        await LocalDB.init();
                        const storedActivities = await LocalDB.getAll('activities');
                        const storedDaysOff = await LocalDB.getAll('daysOff');
                        const storedSettings = await LocalDB.getAll('settings');
                        const storedInventory = await LocalDB.getAll('inventory');

                        setActivities(storedActivities);
                        setDaysOff(storedDaysOff);
                        setInventory(storedInventory);

                        const config = storedSettings.find(s => s.id === 'config');
                        if (config) {
                            if (config.serviceTypes) setServiceTypes(config.serviceTypes);
                            if (config.locations) setLocations(config.locations);
                            if (config.dayOffReasons) setDayOffReasons(config.dayOffReasons);
                        }
                        setIsLoadingData(false);
                    } catch (err) {
                        console.error("Erro ao iniciar DB local:", err);
                        showMessage('error', 'Erro ao carregar banco de dados local.');
                        setIsLoadingData(false);
                    }
                };
                loadData();
            }, []);

            const handleSaveActivities = async (newActivitiesArray, startDate) => {
                try {
                    for (const act of newActivitiesArray) {
                        await LocalDB.put('activities', act);
                    }
                    setActivities(prev => [...prev, ...newActivitiesArray]);
                    showMessage('success', 'Atividade(s) salva(s) localmente com sucesso!');
                } catch (err) {
                    showMessage('error', 'Erro ao salvar no banco de dados local.');
                }
                setCurrentDate(new Date(startDate + 'T12:00:00'));
                setActiveTab('agenda');
            };

            const handleSaveDaysOff = async (newDaysOffArray, startDate) => {
                try {
                    for (const day of newDaysOffArray) {
                        await LocalDB.put('daysOff', day);
                    }
                    setDaysOff(prev => [...prev, ...newDaysOffArray]);
                    showMessage('success', 'Folga(s) salva(s) localmente com sucesso!');
                } catch (err) {
                    showMessage('error', 'Erro ao salvar no banco de dados local.');
                }
                setCurrentDate(new Date(startDate + 'T12:00:00'));
                setActiveTab('agenda');
            };

            const deleteItem = async (type, ids) => {
                const idsArray = Array.isArray(ids) ? ids : [ids];
                const storeName = type === 'activity' ? 'activities' : 'daysOff';
                
                try {
                    for (const id of idsArray) {
                        await LocalDB.delete(storeName, id);
                    }
                    
                    if (type === 'activity') setActivities(prev => prev.filter(a => !idsArray.includes(a.id)));
                    else setDaysOff(prev => prev.filter(d => !idsArray.includes(d.id)));
                    
                    showMessage('success', 'Registro(s) removido(s) do banco de dados!');
                } catch (err) {
                    showMessage('error', 'Erro ao deletar registro.');
                }
            };
            
            const handleEditItem = async (item, newValues) => {
                const idsArray = item.spanIds || [item.id];
                const isDayOff = item.isDayOff;
                const storeName = isDayOff ? 'daysOff' : 'activities';

                try {
                    for (const id of idsArray) {
                        let targetItem = isDayOff ? daysOff.find(d => d.id === id) : activities.find(a => a.id === id);

                        if (targetItem) {
                            let updatedItem = { ...targetItem, ...newValues };
                            await LocalDB.put(storeName, updatedItem);
                        }
                    }

                    if (isDayOff) {
                        setDaysOff(prev => prev.map(d => idsArray.includes(d.id) ? { ...d, ...newValues } : d));
                    } else {
                        setActivities(prev => prev.map(a => idsArray.includes(a.id) ? { ...a, ...newValues } : a));
                    }

                    showMessage('success', 'Registro atualizado e salvo com sucesso!');
                    setSelectedItem(prev => ({ ...prev, ...newValues }));
                } catch (err) {
                    showMessage('error', 'Erro ao atualizar no banco de dados.');
                }
            };

            const updateSettings = async (key, newArray) => {
                let newConfig = { id: 'config', serviceTypes, locations, dayOffReasons };
                newConfig[key] = newArray; 

                if (key === 'serviceTypes') setServiceTypes(newArray);
                if (key === 'locations') setLocations(newArray);
                if (key === 'dayOffReasons') setDayOffReasons(newArray);

                try {
                    await LocalDB.put('settings', newConfig);
                } catch (err) {
                    showMessage('error', 'Erro ao salvar configurações.');
                }
            };

            const handleImportCSV = (file) => {
                showMessage('success', 'Lendo arquivo, aguarde...');
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, {type:'binary'});
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = XLSX.utils.sheet_to_json(ws);

                        if(data.length === 0) {
                            showMessage('error', 'O arquivo está vazio ou formato inválido.');
                            return;
                        }

                        let actsToAdd = [];
                        let daysOffToAdd = [];
                        let errors = 0;
                        let firstDateStr = null;

                        let newServicesSet = new Set();
                        let newLocationsSet = new Set();

                        const parseDate = (d) => {
                            if(!d) return null;
                            if(typeof d === 'number') { 
                                const date = new Date(Math.round((d - 25569)*86400*1000));
                                return date.toISOString().split('T')[0];
                            }
                            if(d.includes('/')) {
                                const parts = d.split('/');
                                if(parts.length === 3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                            }
                            if(d.includes('-')) return d.split('T')[0];
                            return null;
                        };

                        data.forEach((row) => {
                            const colabName = row['Colaborador'];
                            if(!colabName) return;

                            const emp = employees.find(e => e.name.toLowerCase() === colabName.toString().toLowerCase().trim());
                            if(!emp) { errors++; return; }

                            const tipo = (row['Tipo (Atividade/Folga)'] || row['Tipo'] || '').toString().toLowerCase();
                            const isFolga = tipo.includes('folga') || tipo.includes('day off');

                            let dStart = parseDate(row['Data Inicio'] || row['Data Início'] || row['Data']);
                            let dEnd = parseDate(row['Data Fim']) || dStart;

                            if(!dStart) { errors++; return; }
                            if(dStart < '2023-01-01') return;
                            if(dEnd < dStart) dEnd = dStart;

                            if(!firstDateStr) firstDateStr = dStart;

                            const dates = getDatesInRange(dStart, dEnd);

                            const sType = (row['Tipo Servico'] || row['Tipo de Serviço'] || 'Importado').toString().trim();
                            const sLoc = (row['Localidade'] || 'Importado').toString().trim();

                            if (!isFolga) {
                                if (sType && !serviceTypes.includes(sType)) newServicesSet.add(sType);
                                if (sLoc && !locations.includes(sLoc)) newLocationsSet.add(sLoc);
                            }

                            dates.forEach(date => {
                                if(isFolga) {
                                    daysOffToAdd.push({
                                        id: Date.now() + Math.random(),
                                        employeeId: emp.id,
                                        date: date,
                                        reason: row['Motivo'] || row['Descricao'] || 'Importado via Planilha'
                                    });
                                } else {
                                    actsToAdd.push({
                                        id: Date.now() + Math.random(),
                                        employeeId: emp.id,
                                        date: date,
                                        sector: emp.category,
                                        serviceType: sType,
                                        location: sLoc,
                                        description: row['Descricao'] || row['Descrição'] || ''
                                    });
                                }
                            });
                        });

                        let updatedServiceTypes = [...serviceTypes];
                        let updatedLocations = [...locations];
                        let settingsChanged = false;

                        if (newServicesSet.size > 0) {
                            updatedServiceTypes = [...serviceTypes, ...Array.from(newServicesSet)];
                            setServiceTypes(updatedServiceTypes);
                            settingsChanged = true;
                        }
                        if (newLocationsSet.size > 0) {
                            updatedLocations = [...locations, ...Array.from(newLocationsSet)];
                            setLocations(updatedLocations);
                            settingsChanged = true;
                        }

                        if (settingsChanged) {
                            await LocalDB.put('settings', { 
                                id: 'config', 
                                serviceTypes: updatedServiceTypes, 
                                locations: updatedLocations, 
                                dayOffReasons: dayOffReasons 
                            });
                        }

                        for (const act of actsToAdd) await LocalDB.put('activities', act);
                        for (const day of daysOffToAdd) await LocalDB.put('daysOff', day);

                        if (actsToAdd.length > 0) setActivities(prev => [...prev, ...actsToAdd]);
                        if (daysOffToAdd.length > 0) setDaysOff(prev => [...prev, ...daysOffToAdd]);

                        showMessage('success', `Importação concluída! ${actsToAdd.length} dias de atividade adicionados. (${errors} ignorados)`);
                        
                        if(firstDateStr) setCurrentDate(new Date(firstDateStr + 'T12:00:00'));

                    } catch (err) {
                        console.error(err);
                        showMessage('error', 'Erro ao ler o arquivo. Certifique-se de usar o Modelo de Importação padrão.');
                    }
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen flex flex-col relative w-full">
                    {/* Header */}
                    <header className="ods-red-bg text-white shadow-md no-print">
                        <div className="w-full px-4 py-3 flex flex-col xl:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                {!logoError ? (
                                    <img 
                                        src="https://ods-metering.com/wp-content/uploads/2024/09/ODS-METERING-SYSTEMS-LOGO-V2.png" 
                                        alt="ODS Metering Systems Logo" 
                                        className="h-10 bg-white p-1 rounded" 
                                        onError={() => setLogoError(true)}
                                    />
                                ) : (
                                    <div className="bg-white px-3 py-1.5 rounded flex items-center justify-center shadow-sm">
                                        <span className="text-red-600 font-black text-2xl italic tracking-tighter">ODS</span>
                                        <span className="text-gray-800 font-bold text-[10px] leading-tight ml-1.5 border-l border-gray-300 pl-1.5">METERING<br/>SYSTEMS</span>
                                    </div>
                                )}
                                <div>
                                    <h1 className="text-xl font-bold leading-tight">Painel Operacional</h1>
                                    <p className="ods-red-light-text text-sm hidden md:block">Gestão de Serviços e Folgas</p>
                                </div>
                            </div>
                            
                            <div className="flex ods-red-bg-hover p-1 rounded-lg w-full xl:w-auto overflow-x-auto hide-scrollbar">
                                <button onClick={() => setActiveTab('agenda')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all ${activeTab === 'agenda' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}>Visão Geral</button>
                                <button onClick={() => setActiveTab('add-activity')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all ${activeTab === 'add-activity' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}>+ Atividade</button>
                                <button onClick={() => setActiveTab('add-dayoff')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all ${activeTab === 'add-dayoff' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}>+ Folga</button>
                                <button onClick={() => setActiveTab('inventory')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all flex items-center justify-center gap-2 ${activeTab === 'inventory' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}><PackageIcon /> Estoque</button>
                                <button onClick={() => setActiveTab('checklist')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all flex items-center justify-center gap-2 ${activeTab === 'checklist' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}><ClipboardCheckIcon /> In / Out</button>
                                <button onClick={() => setActiveTab('config')} className={`flex-1 xl:flex-none whitespace-nowrap px-4 py-2 text-sm font-medium rounded-md transition-all flex items-center justify-center gap-2 ${activeTab === 'config' ? 'bg-white ods-red-text shadow' : 'text-white hover:bg-white hover:ods-red-text'}`}><SettingsIcon /> Cadastros</button>
                            </div>
                        </div>
                    </header>

                    {message && (
                        <div className="w-full px-4 mt-4 relative z-50 no-print">
                            <div className={`p-4 rounded-lg flex items-center gap-3 shadow-sm border ${message.type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : 'bg-green-50 text-green-800 border-green-200'}`}>
                                {message.type === 'error' ? <AlertIcon /> : <div className="w-5 h-5 rounded-full bg-green-200 flex items-center justify-center text-green-700">✓</div>}
                                <p className="font-medium">{message.text}</p>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 w-full px-2 md:px-4 py-4 flex flex-col h-full">
                        {isLoadingData ? (
                            <div className="flex flex-col items-center justify-center py-20 text-gray-500">
                                <svg className="animate-spin h-8 w-8 text-red-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <p className="font-medium">Carregando Banco de Dados Local...</p>
                            </div>
                        ) : (
                            <>
                                {activeTab === 'agenda' && (
                                    <AgendaView activities={activities} daysOff={daysOff} employees={employees} currentDate={currentDate} setCurrentDate={setCurrentDate} selectedItem={selectedItem} setSelectedItem={setSelectedItem} showMessage={showMessage} handleImportCSV={handleImportCSV} />
                                )}
                                {activeTab === 'add-activity' && (
                                    <ActivityForm handleSaveActivities={handleSaveActivities} daysOff={daysOff} employees={employees} showMessage={showMessage} serviceTypes={serviceTypes} locations={locations} setActiveTab={setActiveTab} setCurrentDate={setCurrentDate} />
                                )}
                                {activeTab === 'add-dayoff' && (
                                    <DayOffForm handleSaveDaysOff={handleSaveDaysOff} activities={activities} employees={employees} showMessage={showMessage} dayOffReasons={dayOffReasons} setActiveTab={setActiveTab} setCurrentDate={setCurrentDate} />
                                )}
                                {activeTab === 'inventory' && (
                                    <InventoryView inventory={inventory} setInventory={setInventory} showMessage={showMessage} />
                                )}
                                {activeTab === 'checklist' && (
                                    <ChecklistInOutForm employees={employees} locations={locations} serviceTypes={serviceTypes} showMessage={showMessage} logoError={logoError} />
                                )}
                                {activeTab === 'config' && (
                                    <ConfigView serviceTypes={serviceTypes} locations={locations} dayOffReasons={dayOffReasons} updateSettings={updateSettings} showMessage={showMessage} />
                                )}
                            </>
                        )}

                        <DetailsModal 
                            selectedItem={selectedItem} 
                            setSelectedItem={setSelectedItem} 
                            deleteItem={deleteItem} 
                            handleEdit={handleEditItem}
                            serviceTypes={serviceTypes}
                            locations={locations}
                            dayOffReasons={dayOffReasons}
                        />
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
